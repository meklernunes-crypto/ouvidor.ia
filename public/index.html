
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orelho</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --panel:#ffffff;
      --panel-soft:#f6f8fb;
      --text:#163243;
      --muted:#6b7280;
      --blue:#1f6a8a;
      --orange:#ef8b6c;
      --red:#dc2626;
      --green:#16a34a;
      --yellow:#d97706;
      --border:#dbe3ef;
      --shadow:0 10px 26px rgba(15,23,42,.06);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      padding:26px 18px 20px;
    }

    .brand-logo{
      width:220px;
      max-width:75%;
      display:block;
      margin:0 auto 10px;
    }

    .welcome{
      font-size:18px;
      font-weight:700;
      margin:12px 0 6px;
      color:var(--blue);
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .primary{background:var(--blue);color:#fff}
    .danger{background:var(--orange);color:#fff}
    .ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .metric{
      font-size:44px;
      font-weight:800;
      margin-top:14px;
      letter-spacing:-.02em;
    }

    .muted,.small{
      color:var(--muted);
      line-height:1.45;
    }

    .small{font-size:12px}

    .status-live{
      margin-top:8px;
      font-size:15px;
      font-weight:700;
      color:var(--blue);
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }

    .hidden{display:none}

    .field-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }

    @media(max-width:850px){
      .field-grid{grid-template-columns:1fr}
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    input::placeholder, textarea::placeholder{
      color:#9aa5b5;
    }

    .mic-btn{
      min-width:44px;
      width:44px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }

    .voice-help{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:8px;
    }

    @media(max-width:700px){
      .action-grid{grid-template-columns:1fr}
    }

    .action-card{
      border:1px solid var(--border);
      background:var(--panel-soft);
      border-radius:16px;
      padding:14px;
    }

    .action-card button{
      width:100%;
      margin-bottom:8px;
    }

    .gagne-block{
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
      padding:14px;
      margin-bottom:10px;
    }

    .gagne-block strong{
      display:block;
      margin-bottom:8px;
    }

    .gagne-line{
      margin-bottom:6px;
      font-size:14px;
      line-height:1.45;
    }

    .range-wrap{
      margin-bottom:16px;
    }

    .range-wrap label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      padding:0;
      border:none;
      border-radius:999px;
      background:#d1d5db;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    input[type="range"]::-moz-range-thumb{
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    .audio-modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.42);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:9999;
    }

    .audio-modal-card{
      background:#fff;
      border-radius:18px;
      padding:18px;
      max-width:560px;
      width:100%;
      box-shadow:0 18px 48px rgba(15,23,42,.18);
    }

    .top-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .history-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:14px;
    }

    .history-item{
      border:1px solid var(--border);
      background:var(--panel-soft);
      border-radius:14px;
      padding:14px;
      cursor:pointer;
    }

    .history-item:hover{
      border-color:#bfd4e3;
    }

    .history-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }

    .pill{
      display:inline-block;
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      background:#eef6fa;
      color:var(--blue);
      margin-right:6px;
      margin-bottom:6px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      margin-top:16px;
    }

    @media(max-width:800px){
      .dashboard-grid{grid-template-columns:1fr}
    }

    .chart-card{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      background:var(--panel-soft);
    }

    .chart-title{
      font-size:14px;
      font-weight:700;
      margin-bottom:8px;
      color:var(--text);
    }

    canvas{
      width:100%;
      height:240px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      display:block;
    }

    .model-option{
      border:1px solid var(--border);
      background:var(--panel-soft);
      border-radius:14px;
      padding:12px;
      margin-top:10px;
    }

    .model-option label{
      display:flex;
      gap:10px;
      align-items:flex-start;
      cursor:pointer;
      font-weight:700;
    }

    .model-option input[type="radio"]{
      width:auto;
      margin-top:3px;
    }

    .model-desc{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .details-summary{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .analyzing{
      animation:pulse 1.2s infinite;
      color:var(--blue);
      font-weight:700;
    }

    @keyframes pulse{
      0%{opacity:0.3}
      50%{opacity:1}
      100%{opacity:0.3}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero">
    <img src="orelho-logo.png" alt="Orelho" class="brand-logo" />
    <div class="welcome">Lá vamos nós. Grave, analise, avalie. Estamos juntos</div>

    <div class="controls">
      <button id="startBtn" class="primary">GRAVAR</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR</button>
    </div>

    <div id="timer" class="metric">00:00</div>
    <div id="statusLive" class="status-live">Aguardando início</div>
    <div id="connectionInline" class="small"></div>
  </div>

  <div class="card" id="instructionsCard">
    <div class="section-title">Após encerrar, você poderá:</div>
    <div class="muted">
      → Inserir detalhes sobre a gravação<br />
      → Analisar e receber feedbacks do Orelho por I.A.<br />
      → Fazer uma autoavaliação<br />
      → Atualizar seu histórico<br />
      → Salvar, deletar, compartilhar.
    </div>
  </div>

  <div id="postRecordBlock" class="hidden"></div>
  <div id="analysisBlock" class="hidden"></div>
  <div id="historyBlock"></div>
  <div id="audioModalRoot"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const CONFIG_KEY = "orelho_last_config_v1";
  const DB_NAME = "orelho_app_v3";
  const DB_VERSION = 1;
  const RECORDS_STORE = "records";
  const AUDIO_STORE = "audios";

  const MODEL_CATALOG = {
    gagne: {
      label: "Gagné",
      description: "Presencial / Síncrona • Todos os níveis • Conteúdos processuais, técnicos e passo a passo.",
    },
    bloom: {
      label: "Bloom",
      description: "Híbrida / EAD / Presencial • Fundamental 1 ao Superior • Complexidade e objetivos cognitivos.",
    },
    merrill: {
      label: "Merrill",
      description: "EAD / Híbrida • Superior e Corporativo • Problemas reais e estudos de caso.",
    },
    arcs: {
      label: "ARCS",
      description: "EAD (assíncrona) / Áudio • Médio ao Corporativo • Temas áridos onde o engajamento é o desafio.",
    },
    addie: {
      label: "ADDIE",
      description: "Gestão / Design Instrucional • Coordenação • Planejamento macro da estrutura do curso.",
    },
    assure: {
      label: "ASSURE",
      description: "Híbrida / Multimídia • Fundamental ao Médio • Uso de tecnologia em sala.",
    },
    tpack: {
      label: "TPACK",
      description: "Híbrida / EAD • Todos os níveis • Domínio de tecnologia tanto quanto do tema.",
    },
    reggio: {
      label: "Reggio Emilia",
      description: "Presencial • Educação Infantil • Exploração sensorial e autonomia criativa.",
    },
    kirkpatrick: {
      label: "Kirkpatrick",
      description: "Avaliação de impacto • Corporativo • Resultado e aplicação prática.",
    },
  };

  let recorder = null;
  let stream = null;
  let chunks = [];
  let startTime = null;
  let timerInterval = null;
  let activeVoiceRecognition = null;

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const timerEl = document.getElementById("timer");
  const statusLive = document.getElementById("statusLive");
  const connectionInline = document.getElementById("connectionInline");
  const instructionsCard = document.getElementById("instructionsCard");
  const postRecordBlock = document.getElementById("postRecordBlock");
  const analysisBlock = document.getElementById("analysisBlock");
  const historyBlock = document.getElementById("historyBlock");
  const audioModalRoot = document.getElementById("audioModalRoot");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function bytesToMB(bytes = 0) { return (bytes / (1024 * 1024)).toFixed(2); }

  function formatDateTime(isoString) {
    try {
      return new Date(isoString).toLocaleString("pt-BR");
    } catch {
      return isoString || "";
    }
  }

  function formatShortDate(isoString) {
    try {
      return new Date(isoString).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
    } catch {
      return "";
    }
  }

  function renderConnectionStatus() {
    connectionInline.textContent = navigator.onLine
      ? "Conexão disponível."
      : "Sem conexão. Você pode gravar agora e analisar depois.";
  }

  function getConfig() {
    try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}"); }
    catch { return {}; }
  }

  function saveConfig(obj) {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(obj));
  }

  function clearConfig() {
    localStorage.removeItem(CONFIG_KEY);
  }

  function getDefaultConfig() {
    return {
      localInstitution: "",
      yearLevel: "",
      courseId: "",
      classId: "",
      subject: "",
      topicObjective: "",
      specificStudents: "",
      durationMinutes: "",
      analysisModel: "gagne",
      analysisModelSource: "auto",
      analysisModelReason: "Modelo padrão.",
    };
  }

  async function openAppDB() {
    return await new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(RECORDS_STORE)) {
          db.createObjectStore(RECORDS_STORE, { keyPath: "id" });
        }
        if (!db.objectStoreNames.contains(AUDIO_STORE)) {
          db.createObjectStore(AUDIO_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function putRecord(record) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readwrite");
      tx.objectStore(RECORDS_STORE).put(record);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getRecord(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function getAllRecords() {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).getAll();
      req.onsuccess = () => {
        const items = req.result || [];
        items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        resolve(items);
      };
      req.onerror = () => reject(req.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getAudioBlob(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readonly");
      const req = tx.objectStore(AUDIO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteAudioBlob(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).delete(id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }
    function openVoiceForInput(targetId) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("Seu navegador não oferece gravação por voz neste campo.");
      return null;
    }

    const rec = new SR();
    rec.lang = "pt-BR";
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (e) => {
      const texts = [];
      for (let i = 0; i < e.results.length; i++) {
        texts.push(e.results[i][0].transcript);
      }
      const el = document.getElementById(targetId);
      if (el) el.value = texts.join(" ").trim();
      updatePostDetailsSummary();
      updateModelSuggestionUI();
    };

    return rec;
  }

  function bindHoldToTalk(container = document) {
    container.querySelectorAll(".mic-hold").forEach((btn) => {
      const target = btn.dataset.target;
      if (!target) return;

      const start = (ev) => {
        ev.preventDefault();
        if (activeVoiceRecognition) return;
        const recognition = openVoiceForInput(target);
        if (!recognition) return;
        activeVoiceRecognition = recognition;
        btn.textContent = "🔴";
        try { recognition.start(); } catch {}
      };

      const stop = (ev) => {
        if (ev) ev.preventDefault();
        if (!activeVoiceRecognition) return;
        try { activeVoiceRecognition.stop(); } catch {}
        activeVoiceRecognition = null;
        btn.textContent = "🎤";
      };

      btn.onmousedown = start;
      btn.ontouchstart = start;
      btn.onmouseup = stop;
      btn.onmouseleave = stop;
      btn.ontouchend = stop;
      btn.ontouchcancel = stop;
    });
  }

  function inferModelFromConfig(config) {
    const haystack = [
      config.localInstitution,
      config.yearLevel,
      config.courseId,
      config.classId,
      config.subject,
      config.topicObjective,
      config.specificStudents,
    ].join(" ").toLowerCase();

    const hasAny = (...terms) => terms.some((term) => haystack.includes(term));

    if (hasAny("infantil", "educação infantil", "educacao infantil", "creche", "pré-escola", "pre-escola", "lúdico", "ludico")) {
      return { model: "reggio", reason: "Os detalhes sugerem Educação Infantil, escuta, autonomia e exploração criativa." };
    }

    if (hasAny("corporativo", "educação corporativa", "educacao corporativa", "treinamento", "onboarding", "vendas", "gestão", "gestao", "ti", "caso real", "estudo de caso")) {
      return { model: "merrill", reason: "Os detalhes sugerem aplicação prática, problema real ou treinamento." };
    }

    if (hasAny("ead", "híbrida", "hibrida", "online", "remoto", "áudio", "audio", "engajamento", "tema árido", "tema arido")) {
      return { model: "arcs", reason: "Os detalhes sugerem desafio de motivação, atenção e engajamento." };
    }

    if (hasAny("prova", "redação", "redacao", "argumentação", "argumentacao", "análise", "analise", "produção textual", "producao textual", "debate")) {
      return { model: "bloom", reason: "Os detalhes sugerem foco em complexidade cognitiva e construção intelectual." };
    }

    if (hasAny("coordenação", "coordenacao", "currículo", "curriculo", "plano de curso", "planejamento", "desenho instrucional")) {
      return { model: "addie", reason: "Os detalhes sugerem planejamento macro e design instrucional." };
    }

    if (hasAny("google classroom", "moodle", "plataforma", "tecnologia", "lms", "ambiente virtual", "lousa digital", "aplicativo")) {
      return { model: "tpack", reason: "Os detalhes sugerem integração entre pedagogia, tecnologia e conteúdo." };
    }

    if (hasAny("mídia", "midia", "vídeo", "video", "multimídia", "multimidia", "recurso digital", "recurso audiovisual")) {
      return { model: "assure", reason: "Os detalhes sugerem aula mediada por recursos e tecnologia." };
    }

    if (hasAny("impacto", "resultado", "aplicação prática", "aplicacao pratica", "mudança de comportamento", "mudanca de comportamento")) {
      return { model: "kirkpatrick", reason: "Os detalhes sugerem foco em impacto e aplicação posterior." };
    }

    return { model: "gagne", reason: "Modelo padrão para avaliar estrutura, sequência e lógica da aula." };
  }

  async function shareRecording(recordId) {
    const blob = await getAudioBlob(recordId);
    if (!blob) {
      alert("Gravação não encontrada.");
      return;
    }

    const file = new File([blob], `${recordId}.webm`, { type: blob.type || "audio/webm" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: "Gravação do Orelho" });
        return;
      } catch {}
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${recordId}.webm`;
    a.click();
    URL.revokeObjectURL(url);
    alert("Arquivo baixado para compartilhamento manual.");
  }

  async function openAudioPlayer(recordId) {
    const blob = await getAudioBlob(recordId);
    if (!blob) {
      alert("Gravação não encontrada.");
      return;
    }

    const url = URL.createObjectURL(blob);

    audioModalRoot.innerHTML = `
      <div class="audio-modal" id="audioModal">
        <div class="audio-modal-card">
          <div class="top-line">
            <strong>Ouvir gravação</strong>
            <button class="ghost" id="closeAudioModalBtn">Fechar</button>
          </div>

          <audio id="nativeAudio" controls style="width:100%;margin-top:14px;"></audio>

          <div class="controls">
            <button class="ghost" id="pauseAudioBtn">Pause</button>
            <button class="ghost" id="stopAudioBtn">Stop</button>
          </div>
        </div>
      </div>
    `;

    const nativeAudio = document.getElementById("nativeAudio");
    nativeAudio.src = url;
    nativeAudio.play();

    const close = () => {
      nativeAudio.pause();
      nativeAudio.currentTime = 0;
      URL.revokeObjectURL(url);
      audioModalRoot.innerHTML = "";
    };

    document.getElementById("pauseAudioBtn").onclick = () => nativeAudio.pause();
    document.getElementById("stopAudioBtn").onclick = () => {
      nativeAudio.pause();
      nativeAudio.currentTime = 0;
    };
    document.getElementById("closeAudioModalBtn").onclick = close;
    document.getElementById("audioModal").onclick = (e) => {
      if (e.target.id === "audioModal") close();
    };
  }

  async function deleteRecording(recordId) {
    const ok = confirm("Deseja realmente deletar esta gravação?");
    if (!ok) return;

    await deleteAudioBlob(recordId);

    const record = await getRecord(recordId);
    if (record) {
      record.recorded = false;
      record.audioSizeBytes = 0;
      await putRecord(record);
    }

    postRecordBlock.innerHTML = "";
    postRecordBlock.classList.add("hidden");
    analysisBlock.innerHTML = "";
    analysisBlock.classList.add("hidden");

    await renderHistory();
    alert("Gravação deletada.");
  }

  function drawDashboardChart(canvasId, values, labels) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const parentWidth = canvas.parentElement.clientWidth || 400;
    canvas.width = parentWidth * 2;
    canvas.height = 240 * 2;
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    if (!values.length) {
      ctx.fillStyle = "#94a3b8";
      ctx.font = "24px Arial";
      ctx.fillText("Sem dados ainda", 28, 110);
      return;
    }

    const margin = { top: 30, right: 40, bottom: 70, left: 40 };
    const chartW = W - margin.left - margin.right;
    const chartH = H - margin.top - margin.bottom;

    ctx.strokeStyle = "rgba(148,163,184,.12)";
    ctx.lineWidth = 1;

    [0.25, 0.5, 0.75].forEach((g) => {
      const y = margin.top + chartH * g;
      ctx.beginPath();
      ctx.moveTo(margin.left, y);
      ctx.lineTo(W - margin.right, y);
      ctx.stroke();
    });

    const slotW = chartW / values.length;
    const barW = Math.max(24, slotW * 0.46);

    let sum = 0;
    const medias = values.map((v, i) => {
      sum += v;
      return sum / (i + 1);
    });

    values.forEach((v, i) => {
      const x = margin.left + i * slotW + (slotW - barW) / 2;
      const barH = (v / 10) * chartH;
      const y = margin.top + chartH - barH;

      ctx.fillStyle = "#c8dff0";
      ctx.fillRect(x, y, barW, barH);

      ctx.fillStyle = "#64748b";
      ctx.font = "18px Arial";
      ctx.save();
      ctx.translate(x + barW / 2, H - 18);
      ctx.rotate(-0.45);
      ctx.fillText(labels[i], 0, 0);
      ctx.restore();
    });

    ctx.strokeStyle = "#ef8b6c";
    ctx.lineWidth = 4;
    ctx.beginPath();
    medias.forEach((m, i) => {
      const x = margin.left + i * slotW + slotW / 2;
      const y = margin.top + chartH - (m / 10) * chartH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    const lx = W - 120;
    const ly = 28;
    ctx.strokeStyle = "#ef8b6c";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + 36, ly);
    ctx.stroke();
    ctx.fillStyle = "#ef8b6c";
    ctx.font = "20px Arial";
    ctx.fillText("Média", lx + 46, ly + 7);
  }

  function addTable(doc, startY, rows) {
    let y = startY;
    const leftX = 15;
    const rightX = 105;
    const colWidth = 85;
    const lineHeight = 5;

    doc.setDrawColor(207, 216, 227);
    rows.forEach(([key, value]) => {
      const leftLines = doc.splitTextToSize(String(key), colWidth - 4);
      const rightLines = doc.splitTextToSize(String(value), colWidth - 4);
      const rowHeight = Math.max(leftLines.length, rightLines.length) * lineHeight + 4;

      if (y + rowHeight > 280) {
        doc.addPage();
        y = 20;
      }

      doc.rect(leftX, y, colWidth, rowHeight);
      doc.rect(rightX, y, colWidth, rowHeight);

      doc.setFont("helvetica", "bold");
      doc.text(leftLines, leftX + 2, y + 4);
      doc.setFont("helvetica", "normal");
      doc.text(rightLines, rightX + 2, y + 4);

      y += rowHeight;
    });

    return y + 4;
  }

  async function generatePdf(record) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 15;
    const pageWidth = 180;
    const compact = 5;

    function addWrapped(text, bold = false) {
      doc.setFont("helvetica", bold ? "bold" : "normal");
      const lines = doc.splitTextToSize(text, pageWidth);
      doc.text(lines, 15, y);
      y += lines.length * compact + 2;
      if (y > 280) {
        doc.addPage();
        y = 20;
      }
    }

    try {
      doc.addImage("orelho-logo.png", "PNG", 15, y, 45, 18);
      y += 24;
    } catch {
      addWrapped("ORELHO", true);
    }

    addWrapped("Relatório de análise da gravação", true);
    addWrapped(`Modelo: ${record.analysisModelLabel || MODEL_CATALOG[record.analysisModel || "gagne"]?.label || "Gagné"}`);
    addWrapped(`Motivo da escolha: ${record.analysisModelReason || "Sem motivo registrado."}`);

    addWrapped("Detalhes da gravação", true);
    y = addTable(doc, y, [
      ["Local/Instituição", record.config?.localInstitution || "Não informado"],
      ["Ano/Semestre Letivo; Ciclo; Módulo", record.config?.yearLevel || "Não informado"],
      ["Identificação do Curso", record.config?.courseId || "Não informado"],
      ["Identificação da Turma", record.config?.classId || "Não informado"],
      ["Disciplina", record.config?.subject || "Não informado"],
      ["Tema/Objetivo do Encontro", record.config?.topicObjective || "Não informado"],
      ["Aluno(s) Específico(s)", record.config?.specificStudents || "Não informado"],
      ["Duração prevista do encontro", record.config?.durationMinutes || "Não informado"],
    ]);

    addWrapped("Resumo rápido", true);
    addWrapped(record.tldr || "Sem resumo disponível.");

    addWrapped(`Feedback pedagógico — ${record.analysisModelLabel || MODEL_CATALOG[record.analysisModel || "gagne"]?.label || "Gagné"}`, true);
    (record.structure || []).forEach((row, i) => {
      addWrapped(`${i + 1}. ${row.criterion || ""}`, true);
      addWrapped(`Evidência: ${row.evidence || "—"}`);
      addWrapped(`Avaliação: ${row.evaluation || "—"}`);
      addWrapped(`Observações: ${row.observation || "—"}`);
    });

    addWrapped("Autoavaliação", true);
    y = addTable(doc, y, [
      ["Minha preparação prévia", record.socio?.preparacao ?? "-"],
      ["Minha motivação prévia", record.socio?.motivacao ?? "-"],
      ["Meu estado físico na gravação", record.socio?.fisico ?? "-"],
      ["Meu estado mental/emocional na gravação", record.socio?.mental ?? "-"],
      ["Infraestrutura funcionando na gravação", record.socio?.infraestrutura ?? "-"],
      ["Minha satisfação final", record.socio?.satisfacao ?? "-"],
    ]);

    doc.save(`orelho-analise-${Date.now()}.pdf`);
  }

                <button class="ghost mic-btn mic-hold" data-target="postSubject">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Tema/Objetivo do Encontro</label>
              <div class="input-row">
                <input id="postTopicObjective" placeholder="Ex.: Aula Reforço Teorema de Pitágoras" />
                <button class="ghost mic-btn mic-hold" data-target="postTopicObjective">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Aluno(s) Específico(s)</label>
              <div class="input-row">
                <input id="postSpecificStudents" placeholder="Ex.: João Pedro e Maria Izadora" />
                <button class="ghost mic-btn mic-hold" data-target="postSpecificStudents">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Duração do encontro (minutos)</label>
              <div class="input-row">
                <input id="postDurationMinutes" placeholder="Ex.: 45 minutos" />
                <button class="ghost mic-btn mic-hold" data-target="postDurationMinutes">🎤</button>
              </div>
            </div>
          </div>

          ${buildPostRecordModelSection(cfg)}
        </div>
      </div>

      <div class="card">
        <div class="section-title">Gravação encerrada</div>

        <div class="action-grid">
          <div class="action-card">
            <button class="primary" id="analyzeBtn">Analisar gravação</button>
            <div class="small" id="analyzeConnectionNote">${navigator.onLine ? "" : "Sem conexão para analisar."}</div>
          </div>

          <div class="action-card">
            <button class="ghost" id="listenBtn">Ouvir gravação</button>
            <div class="small">Tamanho do arquivo: ${audioSizeLabel}</div>
          </div>

          <div class="action-card">
            <button class="ghost" id="deleteBtn">Deletar gravação</button>
            <div class="small">Remove totalmente o arquivo de áudio.</div>
          </div>

          <div class="action-card">
            <button class="ghost" id="shareBtn">Compartilhar gravação</button>
            <div class="small">${navigator.onLine ? "Compartilhamento disponível." : "Sem conexão para compartilhar."}</div>
          </div>
        </div>
      </div>
    `;

    fillConfigFields(cfg);
    bindHoldToTalk(postRecordBlock);
    bindDetailsInputs();
    updatePostDetailsSummary();
    updateModelSuggestionUI();

    document.getElementById("toggleDetailsBtn").onclick = () => {
      document.getElementById("detailsBlock").classList.toggle("hidden");
    };

    document.getElementById("toggleModelOptionsBtn").onclick = () => {
      document.getElementById("modelOptionsBlock").classList.toggle("hidden");
    };

    document.getElementById("analyzeBtn").onclick = async () => {
      const note = document.getElementById("analyzeConnectionNote");

      const newCfg = {
        ...readPostConfig(),
        analysisModel: document.getElementById("postAnalysisModel").value,
        analysisModelSource: document.getElementById("postAnalysisModelSource").value,
        analysisModelReason: document.getElementById("postAnalysisModelReason").value,
      };

      saveConfig(newCfg);

      const current = await getRecord(record.id);
      if (!current) return;

      current.config = {
        localInstitution: newCfg.localInstitution,
        yearLevel: newCfg.yearLevel,
        courseId: newCfg.courseId,
        classId: newCfg.classId,
        subject: newCfg.subject,
        topicObjective: newCfg.topicObjective,
        specificStudents: newCfg.specificStudents,
        durationMinutes: newCfg.durationMinutes,
      };
      current.analysisModel = newCfg.analysisModel;
      current.analysisModelSource = newCfg.analysisModelSource;
      current.analysisModelReason = newCfg.analysisModelReason;

      await putRecord(current);

      if (!navigator.onLine) {
        note.textContent = "Sem conexão para analisar.";
        return;
      }

      note.innerHTML = `<span class="analyzing">Orelho trabalhando pra você...</span>`;

      const blob = await getAudioBlob(record.id);
      if (!blob) {
        note.textContent = "Gravação não encontrada.";
        return;
      }

      const fd = new FormData();
      fd.append("audio", blob, "gravacao.webm");
      fd.append("localInstitution", current.config.localInstitution || "");
      fd.append("yearLevel", current.config.yearLevel || "");
      fd.append("courseId", current.config.courseId || "");
      fd.append("classId", current.config.classId || "");
      fd.append("subject", current.config.subject || "");
      fd.append("topicObjective", current.config.topicObjective || "");
      fd.append("specificStudents", current.config.specificStudents || "");
      fd.append("durationMinutes", current.config.durationMinutes || "");
      fd.append("systemDate", new Date(current.createdAt).toLocaleString("pt-BR"));
      fd.append("analysisModel", current.analysisModel || "gagne");
      fd.append("analysisModelSource", current.analysisModelSource || "auto");
      fd.append("analysisModelReason", current.analysisModelReason || "");

      let data;
      try {
        const resp = await fetch("/analyze", { method: "POST", body: fd });
        data = await resp.json();
      } catch (e) {
        data = { error: "Falha ao conectar com o servidor." };
      }

      if (data.error) {
        note.textContent = data.error;
        return;
      }

      current.transcript = data.transcript || "";
      current.tldr = data.tldr || "";
      current.structure = Array.isArray(data.structure) ? data.structure : [];
      current.analysisStatus = "analyzed";
      current.analysisModel = data.model || current.analysisModel || "gagne";
      current.analysisModelLabel = data.model_label || MODEL_CATALOG[current.analysisModel]?.label || "Gagné";
      current.analysisModelReason = data.model_reason || current.analysisModelReason || "";
      current.analysisModelSource = data.model_source || current.analysisModelSource || "auto";

      await putRecord(current);

      note.textContent = "Análise concluída.";
      renderAnalysis(current);
      await renderHistory();
    };

    document.getElementById("listenBtn").onclick = () => openAudioPlayer(record.id);
    document.getElementById("deleteBtn").onclick = () => deleteRecording(record.id);
    document.getElementById("shareBtn").onclick = () => shareRecording(record.id);
  }

  async function startRecording() {
    chunks = [];

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
    } catch (err) {
      alert("Não foi possível acessar o microfone. Verifique a permissão do navegador.");
      return;
    }

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : "audio/webm";

    recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    recorder.start();

    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusLive.textContent = "Gravação em andamento";

    timerInterval = setInterval(() => {
      timerEl.textContent = fmtDuration(Math.floor((Date.now() - startTime) / 1000));
    }, 500);
  }

  async function stopRecording() {
    if (!recorder) return;

    stopBtn.disabled = true;
    statusLive.textContent = "Gravação encerrada";

    recorder.stop();

    recorder.onstop = async () => {
      clearInterval(timerInterval);
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
      }

      const blob = new Blob(chunks, { type: chunks[0]?.type || "audio/webm" });
      const saved = { ...getDefaultConfig(), ...getConfig() };

      const record = {
        id: "gravacao_" + Date.now(),
        createdAt: new Date().toISOString(),
        config: {
          localInstitution: saved.localInstitution,
          yearLevel: saved.yearLevel,
          courseId: saved.courseId,
          classId: saved.classId,
          subject: saved.subject,
          topicObjective: saved.topicObjective,
          specificStudents: saved.specificStudents,
          durationMinutes: saved.durationMinutes,
        },
        analysisModel: saved.analysisModel || "gagne",
        analysisModelLabel: MODEL_CATALOG[saved.analysisModel || "gagne"]?.label || "Gagné",
        analysisModelReason: saved.analysisModelReason || "Modelo padrão.",
        analysisModelSource: saved.analysisModelSource || "auto",
        transcript: "",
        tldr: "",
        structure: [],
        socio: {
          preparacao: 5,
          motivacao: 5,
          fisico: 5,
          mental: 5,
          infraestrutura: 5,
          satisfacao: 5
        },
        socioSaved: false,
        recorded: true,
        audioSizeBytes: blob.size,
        analysisStatus: navigator.onLine ? "recorded" : "pending"
      };

      await saveAudioBlob(record.id, blob);
      await putRecord(record);

      timerEl.textContent = "00:00";
      startBtn.disabled = false;
      recorder = null;

      renderPostRecord(record);
      await renderHistory();
    };
  }

  startBtn.addEventListener("click", startRecording);
  stopBtn.addEventListener("click", stopRecording);

  window.addEventListener("online", renderConnectionStatus);
  window.addEventListener("offline", renderConnectionStatus);

  async function init() {
    renderConnectionStatus();
    await renderHistory();
  }

  init();
</script>
</body>
</html>
