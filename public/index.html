
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ouvidor.IA Premium</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --panel:#ffffff;
      --panel-soft:#f3f6fb;
      --text:#1f2a37;
      --muted:#6b7280;
      --blue:#2563eb;
      --blue-soft:#dbeafe;
      --red:#dc2626;
      --green:#16a34a;
      --yellow:#d97706;
      --border:#dbe3ef;
      --shadow:0 8px 24px rgba(15,23,42,.06);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      padding:22px 18px;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.1;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .primary{
      background:var(--blue);
      color:#fff;
    }

    .danger{
      background:var(--red);
      color:#fff;
    }

    .ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .metric{
      font-size:44px;
      font-weight:800;
      margin-top:10px;
      letter-spacing:-.02em;
    }

    .muted,.small{
      color:var(--muted);
      line-height:1.45;
    }

    .small{font-size:12px}

    .checkbox-row{
      margin-top:12px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      color:var(--muted);
    }

    .checkbox-row input{
      width:auto;
      margin:0;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }

    .col-12{grid-column:span 12}
    .col-8{grid-column:span 8}
    .col-6{grid-column:span 6}
    .col-4{grid-column:span 4}
    .col-3{grid-column:span 3}

    @media(max-width:900px){
      .col-8,.col-6,.col-4,.col-3{grid-column:span 12}
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }

    .item{
      padding:14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
    }

    .tag{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .green{
      background:#dcfce7;
      color:#166534;
    }

    .yellow{
      background:#fef3c7;
      color:#92400e;
    }

    .red{
      background:#fee2e2;
      color:#991b1b;
    }

    .hidden{display:none}

    .field-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }

    @media(max-width:850px){
      .field-grid{grid-template-columns:1fr}
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    input::placeholder, textarea::placeholder{
      color:#9aa5b5;
    }

    .mic-btn{
      min-width:44px;
      width:44px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
    }

    .table-wrap{
      overflow:auto;
      border-radius:16px;
      border:1px solid var(--border);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      background:#fff;
    }

    th,td{
      padding:12px;
      text-align:left;
      vertical-align:top;
      border-bottom:1px solid var(--border);
      font-size:14px;
    }

    th{
      background:#f8fafc;
      color:#475569;
      font-weight:700;
    }

    canvas{
      width:100%;
      height:220px;
      background:#fff;
      border-radius:14px;
      border:1px solid var(--border);
    }

    .audio-row{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .range-wrap{
      margin-bottom:16px;
    }

    .range-wrap label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      padding:0;
      border:none;
      border-radius:999px;
      background:#d1d5db;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    input[type="range"]::-moz-range-thumb{
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    .filter-toggle{
      margin-top:12px;
    }

    .filter-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin-top:16px;
    }

    @media(max-width:900px){
      .filter-grid{grid-template-columns:1fr 1fr}
    }

    @media(max-width:600px){
      .filter-grid{grid-template-columns:1fr}
    }

    .clickable{
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease;
    }

    .clickable:hover{
      transform:translateY(-1px);
      border-color:#b9c7db;
    }

    .history-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .chip{
      background:#eef3ff;
      border:1px solid #d9e4ff;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:#37507a;
    }

    .top-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero">
    <h1>Ouvidor.IA Premium</h1>
    <p>Versão premium para teste com professores reais.</p>

    <div class="controls">
      <button id="startBtn" class="primary">INICIAR AULA</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR AULA</button>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="recordCheck" />
      <label for="recordCheck">Gravar aula</label>
    </div>

    <div id="timer" class="metric">00:00</div>
    <div id="status" class="muted">Aguardando início.</div>
  </div>

  <div class="card">
    <div class="top-line">
      <strong>Detalhes da aula (opcional)</strong>
      <button id="toggleConfigBtn" class="ghost">Mostrar / ocultar</button>
    </div>

    <div id="configBlock" class="hidden">
      <div class="small" style="margin-top:12px;">Digite ou grave os detalhes da aula. Informações opcionais.</div>

      <div class="field-grid">
        <div class="field">
          <label>Instituição de Ensino</label>
          <div class="input-row">
            <input id="cfgInstitution" placeholder="Ex.: Colégio Super" />
            <button class="ghost mic-btn" data-voice="cfgInstitution">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Nome da Turma</label>
          <div class="input-row">
            <input id="cfgClass" placeholder="Ex.: 3B" />
            <button class="ghost mic-btn" data-voice="cfgClass">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Disciplina</label>
          <div class="input-row">
            <input id="cfgSubject" placeholder="Ex.: Matemática" />
            <button class="ghost mic-btn" data-voice="cfgSubject">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Tema da Aula</label>
          <div class="input-row">
            <input id="cfgTopic" placeholder="Ex.: Aula Reforço Teorema de Pitágoras" />
            <button class="ghost mic-btn" data-voice="cfgTopic">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Aluno Específico</label>
          <div class="input-row">
            <input id="cfgStudent" placeholder="João Pedro e Maria Izadora" />
            <button class="ghost mic-btn" data-voice="cfgStudent">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Data</label>
          <div class="input-row">
            <input id="cfgDate" placeholder="10/Mar/2026" />
            <button class="ghost mic-btn" data-voice="cfgDate">🎤</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="ghost" id="saveConfigBtn">Salvar detalhes</button>
      </div>
    </div>

    <div id="savedConfigPreview" class="small" style="margin-top:12px;">Nenhuma configuração prévia.</div>
  </div>

  <div id="resultBlock" class="hidden"></div>
  <div id="historyBlock" class="hidden"></div>
</div>

<script>
  const STORAGE_KEY = "ouvidor_ia_premium_history_v3";
  const CONFIG_KEY = "ouvidor_ia_premium_config_v3";
  const AUDIO_DB_NAME = "ouvidor_ia_audio_db_v3";
  const AUDIO_STORE = "audios";

  let recorder = null;
  let stream = null;
  let chunks = [];
  let startTime = null;
  let timerInterval = null;

  let audioContext = null;
  let analyser = null;
  let sourceNode = null;
  let frameId = null;
  let secondTimer = null;
  let perSecondDb = [];
  let currentSecondPeak = 25;
  let currentRecorded = false;

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const timerEl = document.getElementById("timer");
  const statusEl = document.getElementById("status");
  const resultBlock = document.getElementById("resultBlock");
  const historyBlock = document.getElementById("historyBlock");
  const recordCheck = document.getElementById("recordCheck");

  const toggleConfigBtn = document.getElementById("toggleConfigBtn");
  const configBlock = document.getElementById("configBlock");
  const saveConfigBtn = document.getElementById("saveConfigBtn");
  const savedConfigPreview = document.getElementById("savedConfigPreview");

  const cfgInstitution = document.getElementById("cfgInstitution");
  const cfgClass = document.getElementById("cfgClass");
  const cfgSubject = document.getElementById("cfgSubject");
  const cfgTopic = document.getElementById("cfgTopic");
  const cfgStudent = document.getElementById("cfgStudent");
  const cfgDate = document.getElementById("cfgDate");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function colorBand(db){ if(db <= 40) return {key:"Verde", cls:"green", text:"Ruído adequado"}; if(db <= 50) return {key:"Amarela", cls:"yellow", text:"Ruído moderado"}; return {key:"Vermelha", cls:"red", text:"Ruído elevado"}; }
  function getHistory(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } }
  function saveHistory(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, 10))); }
  function getConfig(){ try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}"); } catch { return {}; } }
  function saveConfig(obj){ localStorage.setItem(CONFIG_KEY, JSON.stringify(obj)); }
  function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  function scoreGagne(gagne = []) {
    if (!gagne.length) return 0;
    const map = { Adequado: 2, Parcial: 1, Ausente: 0 };
    const total = gagne.reduce((s, x) => s + (map[x.avaliacao] ?? 0), 0);
    return Math.round((total / (gagne.length * 2)) * 100);
  }

  function computeConductionScore(gagne = []) {
    const alvo = ["Orientação", "Prática", "Feedback", "Avaliação"];
    const rows = gagne.filter(x => alvo.includes(x.etapa));
    return scoreGagne(rows);
  }

  function socioColor(value) {
    if (value <= 3) return "#ef4444";
    if (value <= 7) return "#eab308";
    return "#22c55e";
  }

  function applyRangeColor(el) {
    const v = Number(el.value || 5);
    el.style.background = socioColor(v);
  }

  function renderSlider(label, id, value) {
    return `
      <div class="range-wrap">
        <label>
          <span>${label}</span>
          <strong id="lb-${id}">${value}</strong>
        </label>
        <input
          type="range"
          min="1"
          max="10"
          value="${value}"
          id="sl-${id}"
          oninput="
            document.getElementById('lb-${id}').innerText=this.value;
            this.style.background = (this.value <= 3 ? '#ef4444' : (this.value <= 7 ? '#eab308' : '#22c55e'));
          "
        />
      </div>
    `;
  }

  function renderSavedConfigPreview() {
    const cfg = getConfig();
    const parts = [];
    if (cfg.institution) parts.push(`Instituição: ${cfg.institution}`);
    if (cfg.className) parts.push(`Turma: ${cfg.className}`);
    if (cfg.subject) parts.push(`Disciplina: ${cfg.subject}`);
    if (cfg.topic) parts.push(`Tema: ${cfg.topic}`);
    if (cfg.student) parts.push(`Aluno: ${cfg.student}`);
    if (cfg.date) parts.push(`Data: ${cfg.date}`);
    savedConfigPreview.textContent = parts.length ? parts.join(" • ") : "Nenhuma configuração prévia.";
  }

  function loadConfigIntoFields(prefix = "cfg") {
    const cfg = getConfig();
    document.getElementById(prefix + "Institution").value = cfg.institution || "";
    document.getElementById(prefix + "Class").value = cfg.className || "";
    document.getElementById(prefix + "Subject").value = cfg.subject || "";
    document.getElementById(prefix + "Topic").value = cfg.topic || "";
    document.getElementById(prefix + "Student").value = cfg.student || "";
    document.getElementById(prefix + "Date").value = cfg.date || "";
  }

  function readConfigFromFields(prefix = "cfg") {
    return {
      institution: document.getElementById(prefix + "Institution")?.value.trim() || "",
      className: document.getElementById(prefix + "Class")?.value.trim() || "",
      subject: document.getElementById(prefix + "Subject")?.value.trim() || "",
      topic: document.getElementById(prefix + "Topic")?.value.trim() || "",
      student: document.getElementById(prefix + "Student")?.value.trim() || "",
      date: document.getElementById(prefix + "Date")?.value.trim() || "",
    };
  }

  function bucketByMinute(samples) {
    const out = [];
    if (!samples.length) return out;
    const size = samples.length < 60 ? Math.max(5, Math.ceil(samples.length / Math.min(samples.length, 6))) : 60;
    for (let i = 0; i < samples.length; i += size) {
      const chunk = samples.slice(i, i + size);
      const avg = Math.round(chunk.reduce((a, b) => a + b, 0) / chunk.length);
      out.push(avg);
    }
    return out;
  }

  function drawLineChart(canvasId, samples, minDb = 0, maxDb = 100) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(320, Math.floor(rect.width * 2));
    canvas.height = 440;
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const yFor = (v) => h - ((v - minDb) / (maxDb - minDb || 1)) * (h - 50) - 20;

    ctx.strokeStyle = "#d7dfeb";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 20);
    ctx.lineTo(50, h - 30);
    ctx.lineTo(w - 20, h - 30);
    ctx.stroke();

    if (!samples.length) {
      ctx.fillStyle = "#94a3b8";
      ctx.font = "20px Arial";
      ctx.fillText("Sem dados suficientes para gráfico.", 70, h / 2);
      return;
    }

    const maxX = samples.length - 1 || 1;
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 4;
    ctx.beginPath();
    samples.forEach((v, i) => {
      const x = 60 + (i / maxX) * (w - 100);
      const y = yFor(v);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function drawNoiseChart(canvasId, samples) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(320, Math.floor(rect.width * 2));
    canvas.height = 440;
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const yForDb = (db) => h - ((db - 25) / (85 - 25)) * (h - 50) - 20;

    [["rgba(22,163,74,.10)",25,40],["rgba(217,119,6,.10)",40,50],["rgba(220,38,38,.10)",50,85]].forEach(([color, from, to]) => {
      const y1 = yForDb(to);
      const y2 = yForDb(from);
      ctx.fillStyle = color;
      ctx.fillRect(50, y1, w - 70, y2 - y1);
    });

    ctx.strokeStyle = "#d7dfeb";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 20);
    ctx.lineTo(50, h - 30);
    ctx.lineTo(w - 20, h - 30);
    ctx.stroke();

    if (!samples.length) {
      ctx.fillStyle = "#94a3b8";
      ctx.font = "20px Arial";
      ctx.fillText("Sem dados suficientes para gráfico.", 70, h / 2);
      return;
    }

    const maxX = samples.length - 1 || 1;
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 4;
    ctx.beginPath();
    samples.forEach((db, i) => {
      const x = 60 + (i / maxX) * (w - 100);
      const y = yForDb(db);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function openVoiceForInput(inputId) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("Seu navegador não oferece gravação por voz neste campo.");
      return;
    }
    const r = new SR();
    r.lang = "pt-BR";
    r.continuous = false;
    r.interimResults = false;
    r.onresult = (e) => {
      const txt = e.results[0][0].transcript || "";
      const el = document.getElementById(inputId);
      if (el) el.value = txt;
    };
    r.start();
  }

  async function openAudioDB() {
    return await new Promise((resolve, reject) => {
      const req = indexedDB.open(AUDIO_DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(AUDIO_STORE)) {
          db.createObjectStore(AUDIO_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    const db = await openAudioDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getAudioBlob(id) {
    const db = await openAudioDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readonly");
      const req = tx.objectStore(AUDIO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function playAudio(id) {
    const blob = await getAudioBlob(id);
    if (!blob) {
      alert("Esta aula não teve áudio salvo para reprodução.");
      return;
    }
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play();
  }

  function filteredHistory(filters) {
    const history = getHistory();
    return history.filter((item) => {
      const cfg = item.config || {};
      if (filters.institution && cfg.institution !== filters.institution) return false;
      if (filters.className && cfg.className !== filters.className) return false;
      if (filters.subject && cfg.subject !== filters.subject) return false;
      if (filters.topic && cfg.topic !== filters.topic) return false;
      if (filters.student && cfg.student !== filters.student) return false;
      return true;
    });
  }

  function uniqueValues(arr, key) {
    return [...new Set(arr.map(x => x.config?.[key]).filter(Boolean))];
  }

  function renderRecent(record) {
    const band = colorBand(record.avgDb);

    resultBlock.classList.remove("hidden");
    resultBlock.innerHTML = `
      <div class="card">
        <h2>Resumo da aula recém gravada</h2>
        <div class="small">${new Date(record.createdAt).toLocaleString("pt-BR")}</div>
      </div>

      <div class="card">
        <div class="section-title">Resumo rápido da aula</div>
        <div class="item">${escapeHtml(record.tldr || "Sem resumo.")}</div>
      </div>

      <div class="card">
        <h3>Feedback — Padrão Robert Gagné</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Etapa</th>
                <th>Evidência</th>
                <th>Avaliação</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody>
              ${
                record.gagne?.length
                  ? record.gagne.map(row => `
                    <tr>
                      <td>${escapeHtml(row.etapa || "")}</td>
                      <td>${escapeHtml(row.evidencia || "")}</td>
                      <td>${escapeHtml(row.avaliacao || "")}</td>
                      <td>${escapeHtml(row.observacao || "")}</td>
                    </tr>
                  `).join("")
                  : `<tr><td colspan="4">Sem análise pedagógica.</td></tr>`
              }
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>Ruído da gravação</h3>
        <div class="item" style="margin-bottom:12px;">${band.key} — ${band.text}</div>
        <canvas id="recentNoiseChart"></canvas>
      </div>

      <div class="card">
        <div class="row" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
          <h3 style="margin:0;">Ouvir gravação</h3>
          <button class="ghost" id="playCurrentAudioBtn" ${record.recorded ? "" : "disabled"}>▶ Ouvir gravação</button>
        </div>
      </div>

      <div class="card">
        <div class="top-line">
          <strong>Refinar dados da aula (opcional)</strong>
          <button id="toggleRefineBtn" class="ghost">Mostrar / ocultar</button>
        </div>

        <div id="refineBlock" class="hidden">
          <div class="small" style="margin-top:12px;">Digite ou grave os detalhes da aula. Informações opcionais.</div>

          <div class="field-grid">
            <div class="field">
              <label>Instituição</label>
              <div class="input-row">
                <input id="postInstitution" placeholder="Ex.: Colégio Super" value="${escapeHtml(record.config.institution || "")}" />
                <button class="ghost mic-btn" data-voice="postInstitution">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Turma</label>
              <div class="input-row">
                <input id="postClass" placeholder="Ex.: 3B" value="${escapeHtml(record.config.className || "")}" />
                <button class="ghost mic-btn" data-voice="postClass">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Disciplina</label>
              <div class="input-row">
                <input id="postSubject" placeholder="Ex.: Matemática" value="${escapeHtml(record.config.subject || "")}" />
                <button class="ghost mic-btn" data-voice="postSubject">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Tema</label>
              <div class="input-row">
                <input id="postTopic" placeholder="Ex.: Aula Reforço Teorema de Pitágoras" value="${escapeHtml(record.config.topic || "")}" />
                <button class="ghost mic-btn" data-voice="postTopic">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Aluno</label>
              <div class="input-row">
                <input id="postStudent" placeholder="João Pedro e Maria Izadora" value="${escapeHtml(record.config.student || "")}" />
                <button class="ghost mic-btn" data-voice="postStudent">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Data</label>
              <div class="input-row">
                <input id="postDate" placeholder="10/Mar/2026" value="${escapeHtml(record.config.date || "")}" />
                <button class="ghost mic-btn" data-voice="postDate">🎤</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Sua auto-avaliação</h3>
        ${renderSlider("Motivação prévia", "motivacao", record.socio.motivacao)}
        ${renderSlider("Satisfação final", "satisfacao", record.socio.satisfacao)}
        ${renderSlider("Estado físico", "fisico", record.socio.fisico)}
        ${renderSlider("Estado Emocional/Mental", "mental", record.socio.mental)}
        ${renderSlider("Infraestrutura funcionando", "infraestrutura", record.socio.infraestrutura)}
        <div class="controls">
          <button class="ghost" id="saveAfterBtn">Salvar dados desta aula</button>
        </div>
      </div>
    `;

    setTimeout(() => drawNoiseChart("recentNoiseChart", record.perSecondDb.length < 60 ? record.perSecondDb : record.minuteSamples), 50);
    setTimeout(() => {
      ["motivacao","satisfacao","fisico","mental","infraestrutura"].forEach(id => {
        const el = document.getElementById("sl-" + id);
        if (el) applyRangeColor(el);
      });
    }, 0);

    document.getElementById("playCurrentAudioBtn").onclick = () => playAudio(record.id);

    document.getElementById("toggleRefineBtn").onclick = () => {
      document.getElementById("refineBlock").classList.toggle("hidden");
    };

    document.querySelectorAll('[data-voice]').forEach(btn => {
      btn.onclick = () => openVoiceForInput(btn.getAttribute("data-voice"));
    });

    document.getElementById("saveAfterBtn").onclick = () => {
      const history = getHistory();
      const idx = history.findIndex(x => x.id === record.id);
      if (idx < 0) return;

      history[idx].config = {
        institution: document.getElementById("postInstitution").value.trim(),
        className: document.getElementById("postClass").value.trim(),
        subject: document.getElementById("postSubject").value.trim(),
        topic: document.getElementById("postTopic").value.trim(),
        student: document.getElementById("postStudent").value.trim(),
        date: document.getElementById("postDate").value.trim(),
      };

      history[idx].socio = {
        motivacao: Number(document.getElementById("sl-motivacao").value),
        satisfacao: Number(document.getElementById("sl-satisfacao").value),
        fisico: Number(document.getElementById("sl-fisico").value),
        mental: Number(document.getElementById("sl-mental").value),
        infraestrutura: Number(document.getElementById("sl-infraestrutura").value),
      };

      saveHistory(history);
      saveConfig(history[idx].config);
      renderSavedConfigPreview();
      renderHistory();
      alert("Dados da aula salvos.");
    };
  }

  function renderHistory() {
    const history = getHistory();
    historyBlock.classList.remove("hidden");

    if (!history.length) {
      historyBlock.innerHTML = `<div class="card"><h2>Seu Histórico</h2><div class="small">Ainda não há aulas no histórico.</div></div>`;
      return;
    }

    const all = history;
    const institutionValues = uniqueValues(all, "institution");
    const classValues = uniqueValues(all, "className");
    const subjectValues = uniqueValues(all, "subject");
    const topicValues = uniqueValues(all, "topic");
    const studentValues = uniqueValues(all, "student");

    historyBlock.innerHTML = `
      <div class="card">
        <div class="top-line">
          <h2 style="margin:0;">Seu Histórico</h2>
          <button class="ghost" id="toggleHistoryBtn">Mostrar / ocultar</button>
        </div>

        <div id="historyContent" class="hidden" style="margin-top:16px;">
          <div class="grid">
            <div class="col-6 card clickable" id="cardAmbiental">
              <h3>Fatores ambientais</h3>
              <canvas id="chartAmbiental"></canvas>
              <div id="detailAmbiental" class="small hidden" style="margin-top:10px;"></div>
            </div>

            <div class="col-6 card clickable" id="cardConducao">
              <h3>Fatores de condução</h3>
              <canvas id="chartConducao"></canvas>
              <div id="detailConducao" class="small hidden" style="margin-top:10px;"></div>
            </div>

            <div class="col-6 card clickable" id="cardPedagogico">
              <h3>Fatores pedagógicos</h3>
              <canvas id="chartPedagogico"></canvas>
              <div id="detailPedagogico" class="small hidden" style="margin-top:10px;"></div>
            </div>

            <div class="col-6 card clickable" id="cardSocio">
              <h3>Fatores socioemocionais</h3>
              <canvas id="chartSocio"></canvas>
              <div id="detailSocio" class="small hidden" style="margin-top:10px;"></div>
            </div>
          </div>

          <div class="filter-toggle">
            <button class="ghost" id="toggleFiltersBtn">Filtrar Histórico</button>
          </div>

          <div id="filtersBlock" class="hidden">
            <div class="filter-grid">
              ${renderFilterSelect("fInstitution", "Instituição", institutionValues)}
              ${renderFilterSelect("fClass", "Turma", classValues)}
              ${renderFilterSelect("fSubject", "Disciplina", subjectValues)}
              ${renderFilterSelect("fTopic", "Tema", topicValues)}
              ${renderFilterSelect("fStudent", "Aluno", studentValues)}
            </div>
          </div>

          <div class="card" style="margin-top:16px;">
            <h3>Últimas aulas</h3>
            <div id="historyLessons" class="list"></div>
          </div>

          <div class="card hidden" id="historyLessonDetail"></div>
        </div>
      </div>
    `;

    document.getElementById("toggleHistoryBtn").onclick = () => {
      document.getElementById("historyContent").classList.toggle("hidden");
      if (!document.getElementById("historyContent").classList.contains("hidden")) {
        wireHistory();
      }
    };
  }

  function renderFilterSelect(id, label, values) {
    return `
      <div>
        <label>${label}</label>
        <select id="${id}">
          <option value="">Todos</option>
          ${values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("")}
        </select>
      </div>
    `;
  }

  function wireHistory() {
    const update = () => {
      const filters = {
        institution: document.getElementById("fInstitution").value,
        className: document.getElementById("fClass").value,
        subject: document.getElementById("fSubject").value,
        topic: document.getElementById("fTopic").value,
        student: document.getElementById("fStudent").value,
      };

      const items = filteredHistory(filters);

      const ambiental = items.map(x => x.avgDb || 0);
      const conducao = items.map(x => computeConductionScore(x.gagne || []));
      const pedagogico = items.map(x => scoreGagne(x.gagne || []));
      const socio = items.map(x => avg([
        x.socio?.motivacao || 0,
        x.socio?.satisfacao || 0,
        x.socio?.fisico || 0,
        x.socio?.mental || 0,
        x.socio?.infraestrutura || 0
      ]));

      drawNoiseChart("chartAmbiental", ambiental);
      drawLineChart("chartConducao", conducao, 0, 100);
      drawLineChart("chartPedagogico", pedagogico, 0, 100);
      drawLineChart("chartSocio", socio, 1, 10);

      document.getElementById("detailAmbiental").textContent =
        items.length ? `Média filtrada: ${avg(ambiental)} dB(A).` : "Sem dados para o filtro aplicado.";
      document.getElementById("detailConducao").textContent =
        items.length ? `Média de condução: ${avg(conducao)}.` : "Sem dados para o filtro aplicado.";
      document.getElementById("detailPedagogico").textContent =
        items.length ? `Média pedagógica: ${avg(pedagogico)}.` : "Sem dados para o filtro aplicado.";
      document.getElementById("detailSocio").textContent =
        items.length ? `Média socioemocional: ${avg(socio)}.` : "Sem dados para o filtro aplicado.";

      const list = document.getElementById("historyLessons");
      list.innerHTML = items.length
        ? items.map(item => {
            const details = [];
            if (item.config?.institution) details.push(item.config.institution);
            if (item.config?.className) details.push(item.config.className);
            if (item.config?.subject) details.push(item.config.subject);
            if (item.config?.topic) details.push(item.config.topic);
            if (item.config?.student) details.push(item.config.student);

            return `
              <div class="item clickable" data-open-record="${item.id}">
                <div class="history-title"><strong>${new Date(item.createdAt).toLocaleString("pt-BR")}</strong></div>
                <div class="small">${details.length ? escapeHtml(details.join(" / ")) : "Detalhes não informados"}</div>
              </div>
            `;
          }).join("")
        : `<div class="item">Nenhuma aula encontrada com esses filtros.</div>`;

      document.querySelectorAll("[data-open-record]").forEach(el => {
        el.onclick = () => openHistoryRecord(el.getAttribute("data-open-record"));
      });
    };

    document.getElementById("toggleFiltersBtn").onclick = () => {
      document.getElementById("filtersBlock").classList.toggle("hidden");
    };

    ["fInstitution","fClass","fSubject","fTopic","fStudent"].forEach(id => {
      document.getElementById(id).onchange = update;
    });

    ["Ambiental","Conducao","Pedagogico","Socio"].forEach(name => {
      document.getElementById("card" + name).onclick = () => {
        document.getElementById("detail" + name).classList.toggle("hidden");
      };
    });

    update();
  }

  function openHistoryRecord(id) {
    const history = getHistory();
    const record = history.find(x => x.id === id);
    if (!record) return;

    const target = document.getElementById("historyLessonDetail");
    if (!target) return;

    const band = colorBand(record.avgDb);

    const details = [];
    if (record.config?.institution) details.push(record.config.institution);
    if (record.config?.className) details.push(record.config.className);
    if (record.config?.subject) details.push(record.config.subject);
    if (record.config?.topic) details.push(record.config.topic);
    if (record.config?.student) details.push(record.config.student);

    target.classList.remove("hidden");
    target.innerHTML = `
      <h3>Registro completo da aula</h3>
      <div class="item" style="margin-bottom:12px;"><strong>${new Date(record.createdAt).toLocaleString("pt-BR")}</strong></div>
      <div class="small" style="margin-bottom:12px;">${details.length ? escapeHtml(details.join(" / ")) : "Detalhes não informados"}</div>

      <div class="item" style="margin-bottom:12px;"><strong>Resumo rápido:</strong> ${escapeHtml(record.tldr || "Sem resumo.")}</div>
      <div class="item" style="margin-bottom:12px;"><strong>Ruído:</strong> ${band.key} — ${band.text}</div>

      <div class="table-wrap" style="margin-bottom:12px;">
        <table>
          <thead>
            <tr>
              <th>Etapa</th>
              <th>Evidência</th>
              <th>Avaliação</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody>
            ${(record.gagne || []).map(row => `
              <tr>
                <td>${escapeHtml(row.etapa || "")}</td>
                <td>${escapeHtml(row.evidencia || "")}</td>
                <td>${escapeHtml(row.avaliacao || "")}</td>
                <td>${escapeHtml(row.observacao || "")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <div class="audio-row">
        <button class="ghost" id="playHistoryAudioBtn" ${record.recorded ? "" : "disabled"}>▶ Ouvir gravação</button>
        <button class="ghost" id="closeHistoryDetailBtn">Fechar</button>
      </div>
    `;

    document.getElementById("playHistoryAudioBtn").onclick = () => playAudio(record.id);
    document.getElementById("closeHistoryDetailBtn").onclick = () => {
      target.classList.add("hidden");
      target.innerHTML = "";
    };

    target.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  async function startRecording() {
    resultBlock.classList.add("hidden");
    historyBlock.classList.add("hidden");
    chunks = [];
    perSecondDb = [];
    currentSecondPeak = 25;
    currentRecorded = recordCheck.checked;

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : "audio/webm";

    recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    recorder.start();

    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = "Captando aula...";

    timerInterval = setInterval(() => {
      timerEl.textContent = fmtDuration(Math.floor((Date.now() - startTime) / 1000));
    }, 500);

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.2;
    sourceNode = audioContext.createMediaStreamSource(stream);
    sourceNode.connect(analyser);

    const data = new Float32Array(analyser.fftSize);

    function tick() {
      analyser.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      const rms = Math.sqrt(sum / data.length);
      let db = 35 + (Math.min(1, rms * 20) * 40);
      db = Math.round(Math.max(25, Math.min(85, db)));
      if (db > currentSecondPeak) currentSecondPeak = db;
      frameId = requestAnimationFrame(tick);
    }

    frameId = requestAnimationFrame(tick);

    secondTimer = setInterval(() => {
      perSecondDb.push(currentSecondPeak);
      currentSecondPeak = 25;
      statusEl.textContent = `Captando aula... Ruído atual ${perSecondDb[perSecondDb.length - 1]} dB(A)`;
    }, 1000);
  }

  async function stopRecording() {
    stopBtn.disabled = true;
    statusEl.textContent = "Processando com IA...";

    recorder.stop();

    recorder.onstop = async () => {
      clearInterval(timerInterval);
      cancelAnimationFrame(frameId);
      clearInterval(secondTimer);

      stream.getTracks().forEach((t) => t.stop());

      const blob = new Blob(chunks, { type: chunks[0]?.type || "audio/webm" });
      const cfg = getConfig();

      const fd = new FormData();
      fd.append("audio", blob, "aula.webm");
      fd.append("institution", cfg.institution || "");
      fd.append("className", cfg.className || "");
      fd.append("subject", cfg.subject || "");
      fd.append("topic", cfg.topic || "");
      fd.append("student", cfg.student || "");
      fd.append("date", cfg.date || "");

      let data;
      try {
        const resp = await fetch("/analyze", { method: "POST", body: fd });
        data = await resp.json();
      } catch (e) {
        data = {
          error: "Falha ao conectar com o servidor.",
          detail: String(e.message || e),
        };
      }

      const durationSec = Math.max(1, Math.floor((Date.now() - startTime) / 1000));
      const minuteSamples = bucketByMinute(perSecondDb);
      const avgDb = minuteSamples.length ? Math.round(minuteSamples.reduce((a,b)=>a+b,0)/minuteSamples.length) : 0;
      const peakDb = perSecondDb.length ? Math.max(...perSecondDb) : 0;

      const record = {
        id: "aula_" + Date.now(),
        createdAt: new Date().toISOString(),
        config: cfg,
        durationSec,
        avgDb,
        peakDb,
        perSecondDb,
        minuteSamples,
        transcript: data.transcript || "",
        tldr: data.tldr || "",
        gagne: data.gagne || [],
        socio: {
          motivacao: 5,
          satisfacao: 5,
          fisico: 5,
          mental: 5,
          infraestrutura: 5
        },
        recorded: currentRecorded
      };

      if (currentRecorded) {
        await saveAudioBlob(record.id, blob);
      }

      const history = getHistory();
      history.unshift(record);
      saveHistory(history);

      renderRecent(record);
      renderHistory();

      timerEl.textContent = "00:00";
      statusEl.textContent = "Aula encerrada.";
      startBtn.disabled = false;
      recordCheck.checked = false;
    };
  }

  toggleConfigBtn.onclick = () => {
    configBlock.classList.toggle("hidden");
  };

  saveConfigBtn.onclick = () => {
    const cfg = readConfigFromFields("cfg");
    saveConfig(cfg);
    renderSavedConfigPreview();
    alert("Detalhes salvos no dispositivo.");
  };

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-voice]");
    if (btn) openVoiceForInput(btn.getAttribute("data-voice"));
  });

  startBtn.onclick = startRecording;
  stopBtn.onclick = stopRecording;

  loadConfigIntoFields("cfg");
  renderSavedConfigPreview();
  renderHistory();
</script>
