
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ouvidor.IA Premium V2.1</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --panel:#ffffff;
      --panel-soft:#f3f6fb;
      --text:#1f2a37;
      --muted:#6b7280;
      --blue:#2563eb;
      --red:#dc2626;
      --green:#16a34a;
      --yellow:#d97706;
      --border:#dbe3ef;
      --shadow:0 8px 24px rgba(15,23,42,.06);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      padding:22px 18px;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.1;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .primary{background:var(--blue);color:#fff}
    .danger{background:var(--red);color:#fff}
    .ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .metric{
      font-size:44px;
      font-weight:800;
      margin-top:10px;
      letter-spacing:-.02em;
    }

    .muted,.small{
      color:var(--muted);
      line-height:1.45;
    }

    .small{font-size:12px}

    .status-banner{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
    }

    .status-online{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }

    .status-offline{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }

    .col-12{grid-column:span 12}
    .col-8{grid-column:span 8}
    .col-6{grid-column:span 6}
    .col-4{grid-column:span 4}
    .col-3{grid-column:span 3}

    @media(max-width:900px){
      .col-8,.col-6,.col-4,.col-3{grid-column:span 12}
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }

    .item{
      padding:14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
    }

    .tag{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .green{background:#dcfce7;color:#166534}
    .yellow{background:#fef3c7;color:#92400e}
    .red{background:#fee2e2;color:#991b1b}

    .hidden{display:none}

    .field-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }

    @media(max-width:850px){
      .field-grid{grid-template-columns:1fr}
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    input::placeholder, textarea::placeholder{
      color:#9aa5b5;
    }

    .mic-btn{
      min-width:44px;
      width:44px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
    }

    .audio-row{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .range-wrap{
      margin-bottom:16px;
    }

    .range-wrap label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      padding:0;
      border:none;
      border-radius:999px;
      background:#d1d5db;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    input[type="range"]::-moz-range-thumb{
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    .filter-toggle{
      margin-top:12px;
    }

    .filter-grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:12px;
      margin-top:16px;
    }

    @media(max-width:1000px){
      .filter-grid{grid-template-columns:repeat(3,1fr)}
    }

    @media(max-width:700px){
      .filter-grid{grid-template-columns:1fr}
    }

    .clickable{
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease;
    }

    .clickable:hover{
      transform:translateY(-1px);
      border-color:#b9c7db;
    }

    .history-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }

    .top-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .gagne-block{
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
      padding:14px;
      margin-bottom:10px;
    }

    .gagne-block strong{
      display:block;
      margin-bottom:8px;
    }

    .gagne-line{
      margin-bottom:6px;
      font-size:14px;
      line-height:1.45;
    }

    .pending-card{
      border:2px dashed #cbd5e1;
      background:#f8fafc;
    }

    .spacer-top{margin-top:12px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero">
    <h1>Ouvidor.IA Premium</h1>
    <p>Versão premium para teste com professores reais.</p>

    <div class="controls">
      <button id="startBtn" class="primary">INICIAR AULA</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR AULA</button>
    </div>

    <div id="timer" class="metric">00:00</div>
    <div id="status" class="muted">Aguardando início.</div>

    <div id="connectionBanner" class="status-banner"></div>
    <div id="pendingAnalyzeBox" class="spacer-top"></div>
  </div>

  <div class="card">
    <div class="top-line">
      <strong>Detalhes da aula (opcional)</strong>
      <button id="toggleConfigBtn" class="ghost">Mostrar / ocultar</button>
    </div>

    <div id="configBlock" class="hidden">
      <div class="small" style="margin-top:12px;">Digite ou grave os detalhes da aula. Informações opcionais.</div>

      <div class="field-grid">
        <div class="field">
          <label>Local/Instituição</label>
          <div class="input-row">
            <input id="cfgLocalInstitution" placeholder="Ex.: Colégio Super" />
            <button class="ghost mic-btn" data-voice="cfgLocalInstitution">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Ano/Semestre Letivo; Ciclo; Módulo</label>
          <div class="input-row">
            <input id="cfgYearLevel" placeholder="Ex.: 9º Ano Fund1 / 3º Ano Graduação / Infantil 3" />
            <button class="ghost mic-btn" data-voice="cfgYearLevel">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Identificação do Curso</label>
          <div class="input-row">
            <input id="cfgCourseId" placeholder="Ex.: Ensino Médio / Graduação em Administração" />
            <button class="ghost mic-btn" data-voice="cfgCourseId">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Identificação da Turma</label>
          <div class="input-row">
            <input id="cfgClassId" placeholder="Ex.: 3B" />
            <button class="ghost mic-btn" data-voice="cfgClassId">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Disciplina</label>
          <div class="input-row">
            <input id="cfgSubject" placeholder="Ex.: Matemática" />
            <button class="ghost mic-btn" data-voice="cfgSubject">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Tema/Objetivo do Encontro</label>
          <div class="input-row">
            <input id="cfgTopicObjective" placeholder="Ex.: Aula Reforço Teorema de Pitágoras" />
            <button class="ghost mic-btn" data-voice="cfgTopicObjective">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Aluno(s) Específico(s)</label>
          <div class="input-row">
            <input id="cfgSpecificStudents" placeholder="Ex.: João Pedro e Maria Izadora" />
            <button class="ghost mic-btn" data-voice="cfgSpecificStudents">🎤</button>
          </div>
        </div>

        <div class="field">
          <label>Duração do encontro (minutos)</label>
          <div class="input-row">
            <input id="cfgDurationMinutes" placeholder="Ex.: 45 minutos" />
            <button class="ghost mic-btn" data-voice="cfgDurationMinutes">🎤</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="ghost" id="saveConfigBtn">Salvar detalhes</button>
      </div>
    </div>

    <div id="savedConfigPreview" class="small" style="margin-top:12px;">Nenhuma configuração prévia.</div>
  </div>

  <div id="sessionActionBlock" class="hidden"></div>
  <div id="resultBlock" class="hidden"></div>
  <div id="historyBlock" class="hidden"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const STORAGE_KEY = "ouvidor_ia_premium_history_v5";
  const CONFIG_KEY = "ouvidor_ia_premium_config_v5";
  const AUDIO_DB_NAME = "ouvidor_ia_audio_db_v5";
  const AUDIO_STORE = "audios";

  let recorder = null;
  let stream = null;
  let chunks = [];
  let startTime = null;
  let timerInterval = null;

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const timerEl = document.getElementById("timer");
  const statusEl = document.getElementById("status");
  const resultBlock = document.getElementById("resultBlock");
  const historyBlock = document.getElementById("historyBlock");
  const sessionActionBlock = document.getElementById("sessionActionBlock");
  const connectionBanner = document.getElementById("connectionBanner");
  const pendingAnalyzeBox = document.getElementById("pendingAnalyzeBox");

  const toggleConfigBtn = document.getElementById("toggleConfigBtn");
  const configBlock = document.getElementById("configBlock");
  const saveConfigBtn = document.getElementById("saveConfigBtn");
  const savedConfigPreview = document.getElementById("savedConfigPreview");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function getHistory(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } }
  function saveHistory(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, 10))); }
  function getConfig(){ try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}"); } catch { return {}; } }
  function saveConfig(obj){ localStorage.setItem(CONFIG_KEY, JSON.stringify(obj)); }
  function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  function scoreGagne(gagne = []) {
    if (!gagne.length) return 0;
    const map = { Adequado: 2, Parcial: 1, Ausente: 0 };
    const total = gagne.reduce((s, x) => s + (map[x.avaliacao] ?? 0), 0);
    return Math.round((total / (gagne.length * 2)) * 100);
  }

  function computeConductionScore(gagne = []) {
    const alvo = ["Orientação", "Prática", "Feedback", "Avaliação"];
    const rows = gagne.filter(x => alvo.includes(x.etapa));
    return scoreGagne(rows);
  }

  function socioColor(value) {
    if (value <= 3) return "#ef4444";
    if (value <= 7) return "#eab308";
    return "#22c55e";
  }

  function applyRangeColor(el) {
    const v = Number(el.value || 5);
    el.style.background = socioColor(v);
  }

  function bytesToMB(bytes = 0) {
    return (bytes / (1024 * 1024)).toFixed(2);
  }

  function normalizePart(value, fallback) {
    const clean = (value || "")
      .toString()
      .trim()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .toLowerCase();
    return clean || fallback;
  }

  function buildBaseName(record) {
    const d = new Date(record.createdAt || Date.now());
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const cfg = record.config || {};

    return [
      `${yyyy}-${mm}-${dd}`,
      normalizePart(cfg.localInstitution, "sem-local"),
      normalizePart(cfg.yearLevel, "sem-ano-letivo"),
      normalizePart(cfg.courseId, "sem-curso"),
      normalizePart(cfg.classId, "sem-turma"),
      normalizePart(cfg.subject, "sem-disciplina"),
      normalizePart(cfg.topicObjective, "sem-tema")
    ].join("__");
  }

  function renderSlider(label, id, value) {
    return `
      <div class="range-wrap">
        <label>
          <span>${label}</span>
          <strong id="lb-${id}">${value}</strong>
        </label>
        <input
          type="range"
          min="1"
          max="10"
          value="${value}"
          id="sl-${id}"
          oninput="
            document.getElementById('lb-${id}').innerText=this.value;
            this.style.background = (this.value <= 3 ? '#ef4444' : (this.value <= 7 ? '#eab308' : '#22c55e'));
          "
        />
      </div>
    `;
  }

  function renderSavedConfigPreview() {
    const cfg = getConfig();
    const parts = [];
    if (cfg.localInstitution) parts.push(`Local/Instituição: ${cfg.localInstitution}`);
    if (cfg.yearLevel) parts.push(`Ano/Semestre Letivo; Ciclo; Módulo: ${cfg.yearLevel}`);
    if (cfg.courseId) parts.push(`Curso: ${cfg.courseId}`);
    if (cfg.classId) parts.push(`Turma: ${cfg.classId}`);
    if (cfg.subject) parts.push(`Disciplina: ${cfg.subject}`);
    if (cfg.topicObjective) parts.push(`Tema/Objetivo: ${cfg.topicObjective}`);
    if (cfg.specificStudents) parts.push(`Aluno(s): ${cfg.specificStudents}`);
    if (cfg.durationMinutes) parts.push(`Duração: ${cfg.durationMinutes}`);
    savedConfigPreview.textContent = parts.length ? parts.join(" • ") : "Nenhuma configuração prévia.";
  }

  function loadConfigIntoFields(prefix = "cfg") {
    const cfg = getConfig();
    document.getElementById(prefix + "LocalInstitution").value = cfg.localInstitution || "";
    document.getElementById(prefix + "YearLevel").value = cfg.yearLevel || "";
    document.getElementById(prefix + "CourseId").value = cfg.courseId || "";
    document.getElementById(prefix + "ClassId").value = cfg.classId || "";
    document.getElementById(prefix + "Subject").value = cfg.subject || "";
    document.getElementById(prefix + "TopicObjective").value = cfg.topicObjective || "";
    document.getElementById(prefix + "SpecificStudents").value = cfg.specificStudents || "";
    document.getElementById(prefix + "DurationMinutes").value = cfg.durationMinutes || "";
  }

  function readConfigFromFields(prefix = "cfg") {
    return {
      localInstitution: document.getElementById(prefix + "LocalInstitution")?.value.trim() || "",
      yearLevel: document.getElementById(prefix + "YearLevel")?.value.trim() || "",
      courseId: document.getElementById(prefix + "CourseId")?.value.trim() || "",
      classId: document.getElementById(prefix + "ClassId")?.value.trim() || "",
      subject: document.getElementById(prefix + "Subject")?.value.trim() || "",
      topicObjective: document.getElementById(prefix + "TopicObjective")?.value.trim() || "",
      specificStudents: document.getElementById(prefix + "SpecificStudents")?.value.trim() || "",
      durationMinutes: document.getElementById(prefix + "DurationMinutes")?.value.trim() || ""
    };
  }

  function drawLineChart(canvasId, samples, minDb = 0, maxDb = 100) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(320, Math.floor(rect.width * 2));
    canvas.height = 300;
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const yFor = (v) => h - ((v - minDb) / (maxDb - minDb || 1)) * (h - 50) - 20;

    ctx.strokeStyle = "#d7dfeb";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 20);
    ctx.lineTo(50, h - 30);
    ctx.lineTo(w - 20, h - 30);
    ctx.stroke();

    if (!samples.length) {
      ctx.fillStyle = "#94a3b8";
      ctx.font = "20px Arial";
      ctx.fillText("Sem dados suficientes para gráfico.", 70, h / 2);
      return;
    }

    const maxX = samples.length - 1 || 1;
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 4;
    ctx.beginPath();
    samples.forEach((v, i) => {
      const x = 60 + (i / maxX) * (w - 100);
      const y = yFor(v);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function openVoiceForInput(inputId) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("Seu navegador não oferece gravação por voz neste campo.");
      return;
    }
    const r = new SR();
    r.lang = "pt-BR";
    r.continuous = false;
    r.interimResults = false;
    r.onresult = (e) => {
      const txt = e.results[0][0].transcript || "";
      const el = document.getElementById(inputId);
      if (el) el.value = txt;
    };
    r.start();
  }

  async function openAudioDB() {
    return await new Promise((resolve, reject) => {
      const req = indexedDB.open(AUDIO_DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(AUDIO_STORE)) {
          db.createObjectStore(AUDIO_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    const db = await openAudioDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getAudioBlob(id) {
    const db = await openAudioDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readonly");
      const req = tx.objectStore(AUDIO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteAudioBlob(id) {
    const db = await openAudioDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).delete(id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function playAudio(id) {
    const blob = await getAudioBlob(id);
    if (!blob) {
      alert("Esta aula não tem gravação disponível.");
      return;
    }
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play();
  }

  async function analyzeRecord(recordId) {
    const history = getHistory();
    const idx = history.findIndex(x => x.id === recordId);
    if (idx < 0) return;

    const record = history[idx];
    const blob = await getAudioBlob(record.id);

    if (!blob) {
      alert("Gravação não encontrada para análise.");
      return;
    }

    if (!navigator.onLine) {
      alert("Sem conexão. A análise poderá ser feita depois.");
      return;
    }

    statusEl.textContent = "Analisando aula... Pode levar alguns minutos conforme o tamanho da gravação.";

    const fd = new FormData();
    fd.append("audio", blob, "aula.webm");
    fd.append("localInstitution", record.config.localInstitution || "");
    fd.append("yearLevel", record.config.yearLevel || "");
    fd.append("courseId", record.config.courseId || "");
    fd.append("classId", record.config.classId || "");
    fd.append("subject", record.config.subject || "");
    fd.append("topicObjective", record.config.topicObjective || "");
    fd.append("specificStudents", record.config.specificStudents || "");
    fd.append("durationMinutes", record.config.durationMinutes || "");
    fd.append("systemDate", new Date(record.createdAt).toLocaleString("pt-BR"));

    let data;
    try {
      const resp = await fetch("/analyze", { method: "POST", body: fd });
      data = await resp.json();
    } catch (e) {
      data = {
        error: "Falha ao conectar com o servidor.",
        detail: String(e.message || e),
      };
    }

    history[idx].transcript = data.transcript || "";
    history[idx].tldr = data.tldr || "";
    history[idx].gagne = data.gagne || [];
    history[idx].analysisStatus = data.error ? "failed" : "analyzed";
    history[idx].analyzedAt = new Date().toISOString();

    saveHistory(history);
    updateConnectionBanner();
    renderSessionAction(null);
    renderRecent(history[idx]);
    renderHistory();

  function filteredHistory(filters) {
    const history = getHistory().filter(x => x.analysisStatus === "analyzed");
    return history.filter((item) => {
      const cfg = item.config || {};
      if (filters.localInstitution && cfg.localInstitution !== filters.localInstitution) return false;
      if (filters.yearLevel && cfg.yearLevel !== filters.yearLevel) return false;
      if (filters.courseId && cfg.courseId !== filters.courseId) return false;
      if (filters.classId && cfg.classId !== filters.classId) return false;
      if (filters.subject && cfg.subject !== filters.subject) return false;
      if (filters.topicObjective && cfg.topicObjective !== filters.topicObjective) return false;
      if (filters.specificStudents && cfg.specificStudents !== filters.specificStudents) return false;
      return true;
    });
  }

  function uniqueValues(arr, key) {
    return [...new Set(arr.map(x => x.config?.[key]).filter(Boolean))];

  async function deleteRecordingForRecord(recordId) {
    const history = getHistory();
    const idx = history.findIndex(x => x.id === recordId);
    if (idx < 0) return;

    const item = history[idx];
    if (!item.recorded) return;

    await deleteAudioBlob(recordId);
    history[idx].recorded = false;

  function generatePdf(record) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const baseName = buildBaseName(record);
    const fileName = `${baseName}__analise.pdf`;

    let y = 20;
    const lineHeight = 7;
    const pageWidth = 180;

    function addWrapped(text, bold = false) {
      doc.setFont("helvetica", bold ? "bold" : "normal");
      const lines = doc.splitTextToSize(text, pageWidth);
      doc.text(lines, 15, y);
      y += lines.length * lineHeight + 2;
      if (y > 270) {
        doc.addPage();
        y = 20;
      }
    }

    doc.setFontSize(16);
    addWrapped("Relatório de análise da aula", true);
    doc.setFontSize(11);

    addWrapped(`Data do sistema: ${new Date(record.createdAt).toLocaleString("pt-BR")}`);
    addWrapped(`Local/Instituição: ${record.config.localInstitution || "Não informado"}`);
    addWrapped(`Ano/Semestre Letivo; Ciclo; Módulo: ${record.config.yearLevel || "Não informado"}`);
    addWrapped(`Identificação do Curso: ${record.config.courseId || "Não informado"}`);
    addWrapped(`Identificação da Turma: ${record.config.classId || "Não informado"}`);
    addWrapped(`Disciplina: ${record.config.subject || "Não informado"}`);
    addWrapped(`Tema/Objetivo do Encontro: ${record.config.topicObjective || "Não informado"}`);
    addWrapped(`Aluno(s) Específico(s): ${record.config.specificStudents || "Não informado"}`);
    addWrapped(`Duração prevista do encontro: ${record.config.durationMinutes || "Não informado"}`);
    addWrapped(`Resumo rápido: ${record.tldr || "Sem resumo."}`);

    addWrapped("Feedback — Padrão Robert Gagné", true);

    (record.gagne || []).forEach((row, i) => {
      addWrapped(`${i + 1}. ${row.etapa}`, true);
      addWrapped(`Evidência: ${row.evidencia || "—"}`);
      addWrapped(`Avaliação: ${row.avaliacao || "—"}`);
      addWrapped(`Observações: ${row.observacao || "—"}`);
    });

    addWrapped("Sua auto-avaliação", true);
    addWrapped(`Motivação prévia: ${record.socio?.motivacao ?? "-"}`);
    addWrapped(`Satisfação final: ${record.socio?.satisfacao ?? "-"}`);
    addWrapped(`Estado físico: ${record.socio?.fisico ?? "-"}`);
    addWrapped(`Estado Emocional/Mental: ${record.socio?.mental ?? "-"}`);
    addWrapped(`Infraestrutura funcionando: ${record.socio?.infraestrutura ?? "-"}`);

    doc.save(fileName);
  }

  async function startRecording() {
    sessionActionBlock.classList.add("hidden");
    resultBlock.classList.add("hidden");
    historyBlock.classList.add("hidden");
    chunks = [];

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : "audio/webm";

    recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    recorder.start();

    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = "Gravando aula...";

    timerInterval = setInterval(() => {
      timerEl.textContent = fmtDuration(Math.floor((Date.now() - startTime) / 1000));
    }, 500);
  }

  async function stopRecording() {
    stopBtn.disabled = true;
    statusEl.textContent = "Finalizando gravação...";

    recorder.stop();

    recorder.onstop = async () => {
      clearInterval(timerInterval);

      stream.getTracks().forEach((t) => t.stop());

      const blob = new Blob(chunks, { type: chunks[0]?.type || "audio/webm" });
      const cfg = getConfig();

      const record = {
        id: "aula_" + Date.now(),
        createdAt: new Date().toISOString(),
        config: cfg,
        transcript: "",
        tldr: "",
        gagne: [],
        socio: {
          motivacao: 5,
          satisfacao: 5,
          fisico: 5,
          mental: 5,
          infraestrutura: 5
        },
        recorded: true,
        audioSizeBytes: blob.size,
        analysisStatus: navigator.onLine ? "recorded" : "pending"
      };

      await saveAudioBlob(record.id, blob);

      const history = getHistory();
      history.unshift(record);
      saveHistory(history);

      renderSessionAction(record);
      renderHistory();
      updateConnectionBanner();

      timerEl.textContent = "00:00";
      statusEl.textContent = navigator.onLine
        ? "Gravação concluída."
        : "Gravação concluída. A análise ficou pendente por falta de conexão.";

      startBtn.disabled = false;
    };
  }

  toggleConfigBtn.onclick = () => {
    configBlock.classList.toggle("hidden");
  };

  saveConfigBtn.onclick = () => {
    const cfg = readConfigFromFields("cfg");
    saveConfig(cfg);
    renderSavedConfigPreview();
    alert("Detalhes salvos no dispositivo.");
  };

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-voice]");
    if (btn) openVoiceForInput(btn.getAttribute("data-voice"));
  });

  window.addEventListener("online", updateConnectionBanner);
  window.addEventListener("offline", updateConnectionBanner);

  startBtn.onclick = startRecording;
  stopBtn.onclick = stopRecording;

  loadConfigIntoFields("cfg");
  renderSavedConfigPreview();
  renderHistory();
  updateConnectionBanner();
</script>
</body>
</html>
