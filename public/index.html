
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orelho</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --panel:#ffffff;
      --panel-soft:#f6f8fb;
      --text:#163243;
      --muted:#6b7280;
      --blue:#1f6a8a;
      --blue-strong:#14536d;
      --orange:#ef8b6c;
      --red:#dc2626;
      --green:#16a34a;
      --yellow:#d97706;
      --border:#dbe3ef;
      --shadow:0 10px 26px rgba(15,23,42,.06);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      padding:26px 18px 20px;
    }

    .brand-logo{
      width:220px;
      max-width:75%;
      display:block;
      margin:0 auto 10px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .welcome{
      font-size:18px;
      font-weight:700;
      margin:12px 0 6px;
      color:var(--blue-strong);
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .primary{background:var(--blue);color:#fff}
    .danger{background:var(--orange);color:#fff}
    .ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .metric{
      font-size:44px;
      font-weight:800;
      margin-top:14px;
      letter-spacing:-.02em;
    }

    .muted,.small{
      color:var(--muted);
      line-height:1.45;
    }

    .small{font-size:12px}

    .connection-inline{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }

    .status-live{
      margin-top:8px;
      font-size:15px;
      font-weight:700;
      color:var(--blue-strong);
    }

    .hidden{display:none}

    .field-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }

    @media(max-width:850px){
      .field-grid{grid-template-columns:1fr}
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    textarea{
      min-height:88px;
      resize:vertical;
    }

    input::placeholder, textarea::placeholder{
      color:#9aa5b5;
    }

    .mic-btn{
      min-width:44px;
      width:44px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }

    .voice-help{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .range-wrap{
      margin-bottom:16px;
    }

    .range-wrap label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      padding:0;
      border:none;
      border-radius:999px;
      background:#d1d5db;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    input[type="range"]::-moz-range-thumb{
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    .top-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .gagne-block{
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
      padding:14px;
      margin-bottom:10px;
    }

    .gagne-block strong{
      display:block;
      margin-bottom:8px;
    }

    .gagne-line{
      margin-bottom:6px;
      font-size:14px;
      line-height:1.45;
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:8px;
    }

    @media(max-width:700px){
      .action-grid{grid-template-columns:1fr}
    }

    .action-card{
      border:1px solid var(--border);
      background:var(--panel-soft);
      border-radius:16px;
      padding:14px;
    }

    .action-card button{
      width:100%;
      margin-bottom:8px;
    }

    .pending-card{
      border:2px dashed #cbd5e1;
      background:#f8fafc;
    }

    .filter-toggle{
      margin-top:12px;
    }

    .filter-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:12px;
      margin-top:16px;
    }

    @media(max-width:1100px){
      .filter-grid{grid-template-columns:repeat(3,1fr)}
    }

    @media(max-width:700px){
      .filter-grid{grid-template-columns:1fr}
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }

    .col-12{grid-column:span 12}
    .col-6{grid-column:span 6}

    @media(max-width:900px){
      .col-6{grid-column:span 12}
    }

    .chart-card h3{
      margin:0 0 10px;
      font-size:16px;
    }

    .chart-wrap{
      width:100%;
      overflow:hidden;
    }

    canvas{
      width:100%;
      height:250px;
      background:#fff;
      border-radius:14px;
      border:1px solid var(--border);
      display:block;
    }

    .history-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }

    .audio-modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.42);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:9999;
    }

    .audio-modal-card{
      background:#fff;
      border-radius:18px;
      padding:18px;
      max-width:500px;
      width:100%;
      box-shadow:0 18px 48px rgba(15,23,42,.18);
    }

    .audio-progress{
      width:100%;
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin:14px 0 10px;
    }

    .audio-progress-bar{
      height:100%;
      width:0%;
      background:var(--blue);
    }

    .audio-time{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      color:var(--muted);
      margin-bottom:14px;
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero" id="heroCard">
    <img src="orelho-logo.png" alt="Orelho" class="brand-logo" />
    <div class="welcome">Lá vamos nós. Grave, analise, avalie. Estamos juntos</div>

    <div class="controls">
      <button id="startBtn" class="primary">GRAVAR</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR</button>
    </div>

    <div id="timer" class="metric">00:00</div>
    <div id="statusLive" class="status-live">Aguardando início</div>
    <div id="connectionInline" class="connection-inline"></div>
  </div>

  <div class="card" id="instructionsCard">
    <div class="section-title">Após encerrar, você poderá:</div>
    <div class="muted">
      → Inserir detalhes sobre a gravação<br />
      → Analisar e receber feedbacks do Orelho por I.A.<br />
      → Fazer uma autoavaliação<br />
      → Atualizar seu histórico<br />
      → Salvar, deletar, compartilhar.
    </div>
  </div>

  <div id="postRecordBlock" class="hidden"></div>
  <div id="analysisBlock" class="hidden"></div>
  <div id="historyBlock" class="hidden"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

  const DB_VERSION = 1;
  const RECORDS_STORE = "records";

  const MIGRATION_FLAG = "orelho_v3_migrated";

  let recorder = null;

  const startBtn = document.getElementById("startBtn");

  const postRecordBlock = document.getElementById("postRecordBlock");
  const analysisBlock = document.getElementById("analysisBlock");
  const historyBlock = document.getElementById("historyBlock");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function avg(arr){ return arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  function bytesToMB(bytes = 0) {
    return (bytes / (1024 * 1024)).toFixed(2);
  }

  function formatShortDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
  }

  function normalizePart(value, fallback) {
    const clean = (value || "")
      .toString()
      .trim()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .toLowerCase();
    return clean || fallback;
  }

  function buildBaseName(record) {
    const d = new Date(record.createdAt || Date.now());
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const cfg = record.config || {};

    return [
      `${yyyy}-${mm}-${dd}`,
      normalizePart(cfg.localInstitution, "sem-local"),
      normalizePart(cfg.yearLevel, "sem-ano-letivo"),
      normalizePart(cfg.courseId, "sem-curso"),
      normalizePart(cfg.classId, "sem-turma"),
      normalizePart(cfg.subject, "sem-disciplina"),
      normalizePart(cfg.topicObjective, "sem-tema")
    ].join("__");
  }

  function renderSlider(label, id, value) {
    return `
      <div class="range-wrap">
        <label>
          <span>${label}</span>
          <strong id="lb-${id}">${value}</strong>
        </label>
        <input
          type="range"
          min="1"
          max="10"
          value="${value}"
          id="sl-${id}"
          oninput="
            document.getElementById('lb-${id}').innerText=this.value;
            this.style.background = (this.value <= 3 ? '#ef4444' : (this.value <= 7 ? '#eab308' : '#22c55e'));
          "
        />
      </div>
    `;
  }

  function applyRangeColor(el) {
    const v = Number(el.value || 5);
    el.style.background = v <= 3 ? "#ef4444" : (v <= 7 ? "#eab308" : "#22c55e");
  }

  function getConfig() {
    try {
      return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function saveConfig(obj) {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(obj));
  }

  function renderConnectionStatus() {
    connectionInline.textContent = navigator.onLine
      ? "Conexão disponível."
      : "Sem conexão. Você pode gravar agora e analisar depois.";
  }

  function readConfigFromSection(prefix) {
    return {
      localInstitution: document.getElementById(prefix + "LocalInstitution")?.value.trim() || "",
      yearLevel: document.getElementById(prefix + "YearLevel")?.value.trim() || "",
      courseId: document.getElementById(prefix + "CourseId")?.value.trim() || "",
      classId: document.getElementById(prefix + "ClassId")?.value.trim() || "",
      subject: document.getElementById(prefix + "Subject")?.value.trim() || "",
      topicObjective: document.getElementById(prefix + "TopicObjective")?.value.trim() || "",
      specificStudents: document.getElementById(prefix + "SpecificStudents")?.value.trim() || "",
      durationMinutes: document.getElementById(prefix + "DurationMinutes")?.value.trim() || ""
    };
  }

  function fillConfigInSection(prefix, cfg = {}) {
    const set = (id, val) => {
      const el = document.getElementById(prefix + id);
      if (el) el.value = val || "";
    };
    set("LocalInstitution", cfg.localInstitution);
    set("YearLevel", cfg.yearLevel);
    set("CourseId", cfg.courseId);
    set("ClassId", cfg.classId);
    set("Subject", cfg.subject);
    set("TopicObjective", cfg.topicObjective);
    set("SpecificStudents", cfg.specificStudents);
    set("DurationMinutes", cfg.durationMinutes);
  }

  async function openAppDB() {
    return await new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(RECORDS_STORE)) {
          db.createObjectStore(RECORDS_STORE, { keyPath: "id" });
        }
        if (!db.objectStoreNames.contains(AUDIO_STORE)) {
          db.createObjectStore(AUDIO_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function getAllRecords() {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).getAll();
      req.onsuccess = () => resolve((req.result || []).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
      req.onerror = () => reject(req.error);
    });
  }

  async function getRecord(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function putRecord(record) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readwrite");
      tx.objectStore(RECORDS_STORE).put(record);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }
