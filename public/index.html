
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orelho</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --panel:#ffffff;
      --panel-soft:#f6f8fb;
      --text:#163243;
      --muted:#6b7280;
      --blue:#1f6a8a;
      --orange:#ef8b6c;
      --red:#dc2626;
      --green:#16a34a;
      --yellow:#d97706;
      --border:#dbe3ef;
      --shadow:0 10px 26px rgba(15,23,42,.06);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:950px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      padding:26px 18px 20px;
    }

    .brand-logo{
      width:220px;
      max-width:75%;
      display:block;
      margin:0 auto 10px;
    }

    .welcome{
      font-size:18px;
      font-weight:700;
      margin:12px 0 6px;
      color:var(--blue);
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .primary{background:var(--blue);color:#fff}
    .danger{background:var(--orange);color:#fff}
    .ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .metric{
      font-size:44px;
      font-weight:800;
      margin-top:14px;
      letter-spacing:-.02em;
    }

    .muted,.small{
      color:var(--muted);
      line-height:1.45;
    }

    .small{font-size:12px}

    .status-live{
      margin-top:8px;
      font-size:15px;
      font-weight:700;
      color:var(--blue);
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }

    .hidden{display:none}

    .field-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }

    @media(max-width:850px){
      .field-grid{grid-template-columns:1fr}
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input, textarea{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    input::placeholder, textarea::placeholder{
      color:#9aa5b5;
    }

    .mic-btn{
      min-width:44px;
      width:44px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }

    .voice-help{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:8px;
    }

    @media(max-width:700px){
      .action-grid{grid-template-columns:1fr}
    }

    .action-card{
      border:1px solid var(--border);
      background:var(--panel-soft);
      border-radius:16px;
      padding:14px;
    }

    .action-card button{
      width:100%;
      margin-bottom:8px;
    }

    .gagne-block{
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
      padding:14px;
      margin-bottom:10px;
    }

    .gagne-block strong{
      display:block;
      margin-bottom:8px;
    }

    .gagne-line{
      margin-bottom:6px;
      font-size:14px;
      line-height:1.45;
    }

    .range-wrap{
      margin-bottom:16px;
    }

    .range-wrap label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      padding:0;
      border:none;
      border-radius:999px;
      background:#d1d5db;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    input[type="range"]::-moz-range-thumb{
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    .audio-modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.42);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:9999;
    }

    .audio-modal-card{
      background:#fff;
      border-radius:18px;
      padding:18px;
      max-width:560px;
      width:100%;
      box-shadow:0 18px 48px rgba(15,23,42,.18);
    }

    .top-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero">
    <img src="orelho-logo.png" alt="Orelho" class="brand-logo" />
    <div class="welcome">Lá vamos nós. Grave, analise, avalie. Estamos juntos</div>

    <div class="controls">
      <button id="startBtn" class="primary">GRAVAR</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR</button>
    </div>

    <div id="timer" class="metric">00:00</div>
    <div id="statusLive" class="status-live">Aguardando início</div>
    <div id="connectionInline" class="small"></div>
  </div>

  <div class="card" id="instructionsCard">
    <div class="section-title">Após encerrar, você poderá:</div>
    <div class="muted">
      → Inserir detalhes sobre a gravação<br />
      → Analisar e receber feedbacks do Orelho por I.A.<br />
      → Fazer uma autoavaliação<br />
      → Atualizar seu histórico<br />
      → Salvar, deletar, compartilhar.
    </div>
  </div>

  <div id="postRecordBlock" class="hidden"></div>
  <div id="analysisBlock" class="hidden"></div>
  <div id="audioModalRoot"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const CONFIG_KEY = "ouvidor_ia_premium_config_v6";
  const DB_NAME = "orelho_app_v3";
  const DB_VERSION = 1;
  const RECORDS_STORE = "records";
  const AUDIO_STORE = "audios";

  let recorder = null;
  let stream = null;
  let chunks = [];
  let startTime = null;
  let timerInterval = null;
  let activeVoiceRecognition = null;

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const timerEl = document.getElementById("timer");
  const statusLive = document.getElementById("statusLive");
  const connectionInline = document.getElementById("connectionInline");
  const instructionsCard = document.getElementById("instructionsCard");
  const postRecordBlock = document.getElementById("postRecordBlock");
  const analysisBlock = document.getElementById("analysisBlock");
  const audioModalRoot = document.getElementById("audioModalRoot");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function bytesToMB(bytes = 0) { return (bytes / (1024 * 1024)).toFixed(2); }

  function renderConnectionStatus() {
    connectionInline.textContent = navigator.onLine
      ? "Conexão disponível."
      : "Sem conexão. Você pode gravar agora e analisar depois.";
  }

  function getConfig() {
    try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}"); }
    catch { return {}; }
  }

  function saveConfig(obj) {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(obj));
  }

  async function openAppDB() {
    return await new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(RECORDS_STORE)) {
          db.createObjectStore(RECORDS_STORE, { keyPath: "id" });
        }
        if (!db.objectStoreNames.contains(AUDIO_STORE)) {
          db.createObjectStore(AUDIO_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function putRecord(record) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readwrite");
      tx.objectStore(RECORDS_STORE).put(record);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getRecord(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getAudioBlob(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readonly");
      const req = tx.objectStore(AUDIO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteAudioBlob(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).delete(id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  function openVoiceForInput(targetId) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("Seu navegador não oferece gravação por voz neste campo.");
      return null;
    }

    const rec = new SR();
    rec.lang = "pt-BR";
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (e) => {
      const texts = [];
      for (let i = 0; i < e.results.length; i++) {
        texts.push(e.results[i][0].transcript);
      }
      const el = document.getElementById(targetId);
      if (el) el.value = texts.join(" ").trim();
    };

    return rec;
  }

  function bindHoldToTalk(container = document) {
    container.querySelectorAll(".mic-hold").forEach((btn) => {
      const target = btn.dataset.target;
      if (!target) return;

      const start = (ev) => {
        ev.preventDefault();
        if (activeVoiceRecognition) return;
        const recognition = openVoiceForInput(target);
        if (!recognition) return;
        activeVoiceRecognition = recognition;
        btn.textContent = "🔴";
        try { recognition.start(); } catch {}
      };

      const stop = (ev) => {
        if (ev) ev.preventDefault();
        if (!activeVoiceRecognition) return;
        try { activeVoiceRecognition.stop(); } catch {}
        activeVoiceRecognition = null;
        btn.textContent = "🎤";
      };

      btn.onmousedown = start;
      btn.ontouchstart = start;
      btn.onmouseup = stop;
      btn.onmouseleave = stop;
      btn.ontouchend = stop;
      btn.ontouchcancel = stop;
    });
  }

  async function shareRecording(recordId) {
    const blob = await getAudioBlob(recordId);
    if (!blob) {
      alert("Gravação não encontrada.");
      return;
    }

    const file = new File([blob], `${recordId}.webm`, { type: blob.type || "audio/webm" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Gravação do Orelho"
        });
        return;
      } catch {}
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${recordId}.webm`;
    a.click();
    URL.revokeObjectURL(url);
    alert("Arquivo baixado para compartilhamento manual.");
  }

  async function openAudioPlayer(recordId) {
    const blob = await getAudioBlob(recordId);
    if (!blob) {
      alert("Gravação não encontrada.");
      return;
    }

    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    audioModalRoot.innerHTML = `
      <div class="audio-modal" id="audioModal">
        <div class="audio-modal-card">
          <div class="top-line">
            <strong>Ouvir gravação</strong>
            <button class="ghost" id="closeAudioModalBtn">Fechar</button>
          </div>

          <audio id="nativeAudio" controls style="width:100%;margin-top:14px;"></audio>

          <div class="controls">
            <button class="ghost" id="pauseAudioBtn">Pause</button>
            <button class="ghost" id="stopAudioBtn">Stop</button>
          </div>
        </div>
      </div>
    `;

    const nativeAudio = document.getElementById("nativeAudio");
    nativeAudio.src = url;
    nativeAudio.play();

    const close = () => {
      nativeAudio.pause();
      nativeAudio.currentTime = 0;
      URL.revokeObjectURL(url);
      audioModalRoot.innerHTML = "";
    };

    document.getElementById("pauseAudioBtn").onclick = () => nativeAudio.pause();
    document.getElementById("stopAudioBtn").onclick = () => {
      nativeAudio.pause();
      nativeAudio.currentTime = 0;
    };
    document.getElementById("closeAudioModalBtn").onclick = close;
    document.getElementById("audioModal").onclick = (e) => {
      if (e.target.id === "audioModal") close();
    };
  }

  async function deleteRecording(recordId) {
    const ok = confirm("Deseja realmente deletar esta gravação?");
    if (!ok) return;
    await deleteAudioBlob(recordId);
    postRecordBlock.innerHTML = "";
    postRecordBlock.classList.add("hidden");
    analysisBlock.innerHTML = "";
    analysisBlock.classList.add("hidden");
    alert("Gravação deletada.");
  }

  function fillConfigFields(cfg = {}) {
    const set = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.value = val || "";
    };
    set("postLocalInstitution", cfg.localInstitution);
    set("postYearLevel", cfg.yearLevel);
    set("postCourseId", cfg.courseId);
    set("postClassId", cfg.classId);
    set("postSubject", cfg.subject);
    set("postTopicObjective", cfg.topicObjective);
    set("postSpecificStudents", cfg.specificStudents);
    set("postDurationMinutes", cfg.durationMinutes);
  }

  function readPostConfig() {
    return {
      localInstitution: document.getElementById("postLocalInstitution")?.value.trim() || "",
      yearLevel: document.getElementById("postYearLevel")?.value.trim() || "",
      courseId: document.getElementById("postCourseId")?.value.trim() || "",
      classId: document.getElementById("postClassId")?.value.trim() || "",
      subject: document.getElementById("postSubject")?.value.trim() || "",
      topicObjective: document.getElementById("postTopicObjective")?.value.trim() || "",
      specificStudents: document.getElementById("postSpecificStudents")?.value.trim() || "",
      durationMinutes: document.getElementById("postDurationMinutes")?.value.trim() || ""
    };
  }

  function renderSlider(label, id, value) {
    return `
      <div class="range-wrap">
        <label>
          <span>${label}</span>
          <strong id="lb-${id}">${value}</strong>
        </label>
        <input
          type="range"
          min="1"
          max="10"
          value="${value}"
          id="sl-${id}"
          oninput="
            document.getElementById('lb-${id}').innerText=this.value;
            this.style.background=(this.value<=3?'#ef4444':(this.value<=7?'#eab308':'#22c55e'));
          "
        />
      </div>
    `;
  }

  function applyRangeColors() {
    ["preparacao","motivacao","fisico","mental","infraestrutura","satisfacao"].forEach((id) => {
      const el = document.getElementById("sl-" + id);
      if (!el) return;
      const v = Number(el.value || 5);
      el.style.background = v <= 3 ? "#ef4444" : (v <= 7 ? "#eab308" : "#22c55e");
    });
  }

  function renderAnalysis(record) {
    analysisBlock.classList.remove("hidden");
    const audioSizeLabel = record.recorded ? `${bytesToMB(record.audioSizeBytes || 0)} MB` : "sem gravação";

    analysisBlock.innerHTML = `
      <div class="card">
        <div class="section-title">Resumo rápido</div>
        <div class="gagne-block">${escapeHtml(record.tldr || "Sem resumo disponível.")}</div>
      </div>

      <div class="card">
        <strong>Feedback Robert Gagné</strong>
        <div style="margin-top:12px;">
          ${(record.gagne || []).map((row, i) => `
            <div class="gagne-block">
              <strong>${i + 1}. ${escapeHtml(row.etapa || "")}</strong>
              <div class="gagne-line"><strong>Evidência:</strong> ${escapeHtml(row.evidencia || "—")}</div>
              <div class="gagne-line"><strong>Avaliação:</strong> ${escapeHtml(row.avaliacao || "—")}</div>
              <div class="gagne-line"><strong>Observações:</strong> ${escapeHtml(row.observacao || "—")}</div>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="card">
        <strong>Sua autoavaliação</strong>
        <div style="margin-top:12px;">
          ${renderSlider("Minha preparação prévia", "preparacao", record.socio?.preparacao ?? 5)}
          ${renderSlider("Minha motivação prévia", "motivacao", record.socio?.motivacao ?? 5)}
          ${renderSlider("Meu estado físico na gravação", "fisico", record.socio?.fisico ?? 5)}
          ${renderSlider("Meu estado mental/emocional na gravação", "mental", record.socio?.mental ?? 5)}
          ${renderSlider("Infraestrutura funcionando na gravação", "infraestrutura", record.socio?.infraestrutura ?? 5)}
          ${renderSlider("Minha satisfação final", "satisfacao", record.socio?.satisfacao ?? 5)}
        </div>
        <div class="controls">
          <button class="primary" id="saveEvalBtn">Salvar autoavaliação</button>
        </div>
      </div>

      <div class="card">
        <strong>Ações</strong>
        <div class="small" style="margin:10px 0 14px;">Arquivo de gravação: ${audioSizeLabel}</div>
        <div class="controls">
          <button class="ghost" id="savePdfBtn">Salvar PDF</button>
          <button class="ghost" id="playCurrentAudioBtn" ${record.recorded ? "" : "disabled"}>Ouvir gravação</button>
          <button class="ghost" id="deleteAudioBtn" ${record.recorded ? "" : "disabled"}>Deletar gravação</button>
          <button class="ghost" id="shareAudioBtn" ${record.recorded ? "" : "disabled"}>Compartilhar gravação</button>
        </div>
      </div>
    `;

    applyRangeColors();

    document.getElementById("saveEvalBtn").onclick = async () => {
      const current = await getRecord(record.id);
      if (!current) return;

      current.socio = {
        preparacao: Number(document.getElementById("sl-preparacao").value),
        motivacao: Number(document.getElementById("sl-motivacao").value),
        fisico: Number(document.getElementById("sl-fisico").value),
        mental: Number(document.getElementById("sl-mental").value),
        infraestrutura: Number(document.getElementById("sl-infraestrutura").value),
        satisfacao: Number(document.getElementById("sl-satisfacao").value),
      };

      current.socioSaved = true;
      await putRecord(current);
      alert("Autoavaliação salva.");
    };

    document.getElementById("savePdfBtn").onclick = () => generatePdf(record);
    document.getElementById("playCurrentAudioBtn").onclick = () => openAudioPlayer(record.id);
    document.getElementById("deleteAudioBtn").onclick = () => deleteRecording(record.id);
    document.getElementById("shareAudioBtn").onclick = () => shareRecording(record.id);
  }

  function generatePdf(record) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;
    const lineHeight = 7;
    const pageWidth = 180;

    function addWrapped(text, bold = false) {
      doc.setFont("helvetica", bold ? "bold" : "normal");
      const lines = doc.splitTextToSize(text, pageWidth);
      doc.text(lines, 15, y);
      y += lines.length * lineHeight + 2;
      if (y > 270) {
        doc.addPage();
        y = 20;
      }
    }

    doc.setFontSize(16);
    addWrapped("Relatório de análise da gravação", true);
    doc.setFontSize(11);

    addWrapped(`Data do sistema: ${new Date(record.createdAt).toLocaleString("pt-BR")}`);
    addWrapped(`Local/Instituição: ${record.config?.localInstitution || "Não informado"}`);
    addWrapped(`Ano/Semestre Letivo; Ciclo; Módulo: ${record.config?.yearLevel || "Não informado"}`);
    addWrapped(`Identificação do Curso: ${record.config?.courseId || "Não informado"}`);
    addWrapped(`Identificação da Turma: ${record.config?.classId || "Não informado"}`);
    addWrapped(`Disciplina: ${record.config?.subject || "Não informado"}`);
    addWrapped(`Tema/Objetivo do Encontro: ${record.config?.topicObjective || "Não informado"}`);
    addWrapped(`Aluno(s) Específico(s): ${record.config?.specificStudents || "Não informado"}`);
    addWrapped(`Duração prevista do encontro: ${record.config?.durationMinutes || "Não informado"}`);

    addWrapped("Resumo rápido", true);
    addWrapped(record.tldr || "Sem resumo disponível.");

    addWrapped("Feedback Robert Gagné", true);
    (record.gagne || []).forEach((row, i) => {
      addWrapped(`${i + 1}. ${row.etapa || ""}`, true);
      addWrapped(`Evidência: ${row.evidencia || "—"}`);
      addWrapped(`Avaliação: ${row.avaliacao || "—"}`);
      addWrapped(`Observações: ${row.observacao || "—"}`);
    });

    addWrapped("Sua autoavaliação", true);
    addWrapped(`Minha preparação prévia: ${record.socio?.preparacao ?? "-"}`);
    addWrapped(`Minha motivação prévia: ${record.socio?.motivacao ?? "-"}`);
    addWrapped(`Meu estado físico na gravação: ${record.socio?.fisico ?? "-"}`);
    addWrapped(`Meu estado mental/emocional na gravação: ${record.socio?.mental ?? "-"}`);
    addWrapped(`Infraestrutura funcionando na gravação: ${record.socio?.infraestrutura ?? "-"}`);
    addWrapped(`Minha satisfação final: ${record.socio?.satisfacao ?? "-"}`);

    doc.save(`orelho-analise-${Date.now()}.pdf`);
  }

  function renderPostRecord(record) {
    instructionsCard.classList.add("hidden");
    postRecordBlock.classList.remove("hidden");
    analysisBlock.classList.add("hidden");
    analysisBlock.innerHTML = "";

    const audioSizeLabel = `${bytesToMB(record.audioSizeBytes || 0)} MB`;
    const cfg = record.config || getConfig();

    postRecordBlock.innerHTML = `
      <div class="card">
        <div class="top-line">
          <strong>Detalhes da gravação (opcional)</strong>
          <button class="ghost" id="toggleDetailsBtn">Mostrar / ocultar</button>
        </div>

        <div id="detailsBlock" class="hidden">
          <div class="small" style="margin-top:8px;">Digite ou grave os detalhes. Essas informações serão usadas antes da análise.</div>
          <div class="voice-help">🎤 Segure o botão do microfone para falar.</div>

          <div class="field-grid">
            <div class="field">
              <label>Local/Instituição</label>
              <div class="input-row">
                <input id="postLocalInstitution" placeholder="Ex.: Colégio Super" />
                <button class="ghost mic-btn mic-hold" data-target="postLocalInstitution">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Ano/Semestre Letivo; Ciclo; Módulo</label>
              <div class="input-row">
                <input id="postYearLevel" placeholder="Ex.: 9º Ano Fund1 / 3º Ano Graduação / Infantil 3" />
                <button class="ghost mic-btn mic-hold" data-target="postYearLevel">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Identificação do Curso</label>
              <div class="input-row">
                <input id="postCourseId" placeholder="Ex.: Ensino Médio / Graduação em Administração" />
                <button class="ghost mic-btn mic-hold" data-target="postCourseId">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Identificação da Turma</label>
              <div class="input-row">
                <input id="postClassId" placeholder="Ex.: 3B" />
                <button class="ghost mic-btn mic-hold" data-target="postClassId">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Disciplina</label>
              <div class="input-row">
                <input id="postSubject" placeholder="Ex.: Matemática" />
                <button class="ghost mic-btn mic-hold" data-target="postSubject">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Tema/Objetivo do Encontro</label>
              <div class="input-row">
                <input id="postTopicObjective" placeholder="Ex.: Aula Reforço Teorema de Pitágoras" />
                <button class="ghost mic-btn mic-hold" data-target="postTopicObjective">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Aluno(s) Específico(s)</label>
              <div class="input-row">
                <input id="postSpecificStudents" placeholder="Ex.: João Pedro e Maria Izadora" />
                <button class="ghost mic-btn mic-hold" data-target="postSpecificStudents">🎤</button>
              </div>
            </div>

            <div class="field">
              <label>Duração do encontro (minutos)</label>
              <div class="input-row">
                <input id="postDurationMinutes" placeholder="Ex.: 45 minutos" />
                <button class="ghost mic-btn mic-hold" data-target="postDurationMinutes">🎤</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Gravação encerrada</div>

        <div class="action-grid">
          <div class="action-card">
            <button class="primary" id="analyzeBtn">Analisar gravação</button>
            <div class="small" id="analyzeConnectionNote">${navigator.onLine ? "" : "Sem conexão para analisar."}</div>
          </div>

          <div class="action-card">
            <button class="ghost" id="listenBtn">Ouvir gravação</button>
            <div class="small">Tamanho do arquivo: ${audioSizeLabel}</div>
          </div>

          <div class="action-card">
            <button class="ghost" id="deleteBtn">Deletar gravação</button>
            <div class="small">Remove totalmente o arquivo de áudio.</div>
          </div>

          <div class="action-card">
            <button class="ghost" id="shareBtn">Compartilhar gravação</button>
            <div class="small">${navigator.onLine ? "Compartilhamento disponível." : "Sem conexão para compartilhar."}</div>
          </div>
        </div>
      </div>
    `;

    fillConfigFields(cfg);
    bindHoldToTalk(postRecordBlock);

    document.getElementById("toggleDetailsBtn").onclick = () => {
      document.getElementById("detailsBlock").classList.toggle("hidden");
    };

    document.getElementById("analyzeBtn").onclick = async () => {
      const note = document.getElementById("analyzeConnectionNote");
      const newCfg = readPostConfig();
      saveConfig(newCfg);

      const current = await getRecord(record.id);
      if (!current) return;

      current.config = newCfg;
      await putRecord(current);

      if (!navigator.onLine) {
        note.textContent = "Sem conexão para analisar.";
        return;
      }

      note.textContent = "Orelho trabalhando pra você. Pode levar alguns minutos";

      const blob = await getAudioBlob(record.id);
      if (!blob) {
        note.textContent = "Gravação não encontrada.";
        return;
      }

      const fd = new FormData();
      fd.append("audio", blob, "gravacao.webm");
      fd.append("localInstitution", current.config.localInstitution || "");
      fd.append("yearLevel", current.config.yearLevel || "");
      fd.append("courseId", current.config.courseId || "");
      fd.append("classId", current.config.classId || "");
      fd.append("subject", current.config.subject || "");
      fd.append("topicObjective", current.config.topicObjective || "");
      fd.append("specificStudents", current.config.specificStudents || "");
      fd.append("durationMinutes", current.config.durationMinutes || "");
      fd.append("systemDate", new Date(current.createdAt).toLocaleString("pt-BR"));

      let data;
      try {
        const resp = await fetch("/analyze", { method: "POST", body: fd });
        data = await resp.json();
      } catch (e) {
        data = { error: "Falha ao conectar com o servidor." };
      }

      if (data.error) {
        note.textContent = data.error;
        return;
      }

      current.transcript = data.transcript || "";
      current.tldr = data.tldr || "";
      current.gagne = Array.isArray(data.gagne) ? data.gagne : [];
      current.analysisStatus = "analyzed";
      await putRecord(current);

      note.textContent = "Análise concluída.";
      renderAnalysis(current);
    };

    document.getElementById("listenBtn").onclick = () => openAudioPlayer(record.id);
    document.getElementById("deleteBtn").onclick = () => deleteRecording(record.id);
    document.getElementById("shareBtn").onclick = () => shareRecording(record.id);
  }

  async function startRecording() {
    chunks = [];

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
    } catch (err) {
      alert("Não foi possível acessar o microfone. Verifique a permissão do navegador.");
      return;
    }

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : "audio/webm";

    recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    recorder.start();

    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusLive.textContent = "Gravação em andamento";

    timerInterval = setInterval(() => {
      timerEl.textContent = fmtDuration(Math.floor((Date.now() - startTime) / 1000));
    }, 500);
  }

  async function stopRecording() {
    if (!recorder) return;

    stopBtn.disabled = true;
    statusLive.textContent = "Gravação encerrada";

    recorder.stop();

    recorder.onstop = async () => {
      clearInterval(timerInterval);
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
      }

      const blob = new Blob(chunks, { type: chunks[0]?.type || "audio/webm" });
      const cfg = getConfig();

      const record = {
        id: "gravacao_" + Date.now(),
        createdAt: new Date().toISOString(),
        config: cfg,
        transcript: "",
        tldr: "",
        gagne: [],
        socio: {
          preparacao: 5,
          motivacao: 5,
          fisico: 5,
          mental: 5,
          infraestrutura: 5,
          satisfacao: 5
        },
        socioSaved: false,
        specialAnalysis: null,
        specialAnalysisCount: 0,
        recorded: true,
        audioSizeBytes: blob.size,
        analysisStatus: navigator.onLine ? "recorded" : "pending"
      };

      await saveAudioBlob(record.id, blob);
      await putRecord(record);

      timerEl.textContent = "00:00";
      startBtn.disabled = false;
      recorder = null;

      renderPostRecord(record);
    };
  }

  startBtn.addEventListener("click", startRecording);
  stopBtn.addEventListener("click", stopRecording);

  window.addEventListener("online", renderConnectionStatus);
  window.addEventListener("offline", renderConnectionStatus);

  renderConnectionStatus();
</script>
</body>
